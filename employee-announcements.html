<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Employee Announcements</title>

<link rel="icon"
href="assets/logo.png">

<style>

/* ======================================
RESET
====================================== */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#041638;
color:white;
overflow-x:hidden;
}

/* ======================================
MOBILE HEADER
====================================== */

.mobileTop{
display:none;
}

/* ======================================
SIDEBAR
====================================== */

.sidebar{

position:fixed;
left:0;
top:0;
width:250px;
height:100vh;

background:#071b46;

padding:20px 15px;

overflow-y:auto;

z-index:999;

transition:0.3s;

}

.logo{
text-align:center;
margin-bottom:30px;
}

.logo img{
width:90px;
}

.logo h2{
margin-top:10px;
font-size:30px;
}

/* ======================================
MENU BUTTON
====================================== */

.menu-btn{

display:block;
width:100%;
padding:16px;
margin-bottom:12px;

background:#12307a;
color:white;

text-decoration:none;

border-radius:16px;

font-size:16px;
font-weight:bold;

transition:0.3s;

text-align:left;

}

.menu-btn:hover{
background:#f5a000;
color:black;
}

.menu-btn.active{
background:#f5a000;
color:black;
}

/* ======================================
DROPDOWN
====================================== */

.dropdown-btn{

width:100%;
padding:16px;

border:none;
outline:none;

cursor:pointer;

text-align:left;

border-radius:16px;

background:#12307a;
color:#ffb400;

font-size:16px;
font-weight:bold;

margin-bottom:12px;

transition:0.3s;

}

.dropdown-btn:hover{
background:#f5a000;
color:black;
}

/* ======================================
DROPDOWN CONTENT
====================================== */

.dropdown-content{

display:none;
padding-left:8px;
margin-bottom:10px;

}

.dropdown-content.show{
display:block;
}

.dropdown-content a{

display:block;

padding:14px;
margin-bottom:10px;

background:#0f2c6b;

border-radius:14px;

color:white;
text-decoration:none;

font-size:15px;
font-weight:bold;

transition:0.3s;

}

.dropdown-content a:hover{

background:#f5a000;
color:black;

}

/* ======================================
LOGOUT
====================================== */

.logout-btn{

display:block;
width:100%;

padding:16px;

border-radius:16px;

background:red;
color:white;

text-decoration:none;

font-size:16px;
font-weight:bold;

margin-top:20px;

text-align:center;

transition:0.3s;

}

.logout-btn:hover{
background:#c40000;
}

/* ======================================
MAIN
====================================== */

.main{

margin-left:250px;

padding:25px;

min-height:100vh;

}

/* ======================================
TITLE
====================================== */

.page-title{

font-size:42px;
margin-bottom:25px;

}

/* ======================================
FILTER BAR
====================================== */

.filterBar{

display:grid;
grid-template-columns:2fr 1fr;

gap:15px;

margin-bottom:25px;

}

.filterBar input,
.filterBar select{

padding:16px;

border:none;
outline:none;

border-radius:16px;

font-size:15px;

}

/* ======================================
ANNOUNCEMENT CARD
====================================== */

.announcementCard{

background:white;
color:black;

padding:25px;

border-radius:24px;

margin-bottom:20px;

}

.announcementHeader{

display:flex;
justify-content:space-between;
align-items:center;

margin-bottom:15px;

gap:10px;
flex-wrap:wrap;

}

.announcementTitle{

font-size:24px;
font-weight:bold;

}

.priority{

padding:8px 18px;

border-radius:20px;

font-size:13px;
font-weight:bold;

color:white;

}

/* PRIORITY */

.high{
background:red;
}

.medium{
background:#f5a000;
color:black;
}

.low{
background:green;
}

/* MESSAGE */

.announcementMessage{

font-size:17px;
line-height:1.6;

margin-bottom:14px;

}

/* ATTACHMENT */

.attachmentBtn{

display:inline-block;

margin-top:10px;

padding:12px 16px;

background:#005eff;
color:white;

text-decoration:none;

border-radius:12px;

font-size:14px;
font-weight:bold;

transition:0.3s;

}

.attachmentBtn:hover{
background:#0047c7;
}

/* FOOTER */

.announcementFooter{

display:flex;

justify-content:space-between;

align-items:center;

margin-top:16px;

font-size:14px;

color:#555;

flex-wrap:wrap;

gap:10px;

}

/* EMPTY */

.empty{

background:white;
color:black;

padding:40px;

border-radius:20px;

text-align:center;

font-size:18px;

}

/* ======================================
MOBILE
====================================== */

@media(max-width:768px){

/* MOBILE HEADER */

.mobileTop{
display:flex;
justify-content:space-between;
align-items:center;

padding:15px 20px;

background:#071b46;

position:sticky;
top:0;

z-index:3000;
}

.mobileTop img{
width:70px;
height:auto;
}

.menuToggle{
font-size:30px;
cursor:pointer;
}

/* SIDEBAR */

.sidebar{
left:-100%;
width:280px;
}

.sidebar.show{
left:0;
}

/* MAIN */

.main{
margin-left:0;
padding:15px;
padding-bottom:100px;
}

/* TITLE */

.page-title{
font-size:34px;
}

/* FILTER */

.filterBar{
grid-template-columns:1fr;
}

/* ======================================
PREMIUM MOBILE NAV
====================================== */

.mobileBottomNav{

display:flex;
justify-content:space-around;
align-items:center;

position:fixed;
bottom:12px;
left:12px;
right:12px;

height:58px;

background:rgba(7,27,70,0.88);

backdrop-filter:blur(18px);

border-radius:24px;

border:1px solid rgba(255,255,255,0.06);

box-shadow:
0 8px 25px rgba(0,0,0,0.25);

z-index:5000;

padding:6px;

}

/* ITEM */

.bottomNavItem{

flex:1;

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

text-decoration:none;

gap:4px;

background:transparent;

transition:0.3s ease;

}

/* ICON */

.bottomIcon{

width:38px;
height:38px;

border-radius:14px;

background:#12307a;

display:flex;
align-items:center;
justify-content:center;

transition:all 0.3s ease;

}

/* IMAGE */

.bottomIcon img{

width:45px;
height:45px;

object-fit:contain;

}

/* TEXT */

.bottomNavItem p{

font-size:9px;
font-weight:600;

color:white;

margin-top:2px;

}

/* ACTIVE */

.bottomNavItem.active .bottomIcon{

background:#f5a000;

width:34px;
height:34px;

border-radius:12px;

box-shadow:
0 4px 10px rgba(245,160,0,0.22);

}

.bottomNavItem.active{
background:transparent !important;
}

}

/* ======================================
DESKTOP HIDE
====================================== */

@media(min-width:769px){

.mobileBottomNav{
display:none;
}

}

</style>

</head>

<body>

<script>

/* ======================================
SIDEBAR
====================================== */

function openSidebar(){

document
.getElementById("sidebar")
.classList.toggle("show");

}

/* ======================================
DROPDOWN
====================================== */

function toggleDropdown(id){

const menu =
document.getElementById(id);

menu.classList.toggle("show");

}

/* ======================================
SHEET URL
====================================== */

const SHEET_URL =
"https://opensheet.vercel.app/1WgtFzzQTJ4-lRyrS0SURRH8fmMGqjK7Yt2ACDYmn0ZU";

/* ======================================
GLOBAL
====================================== */

let allAnnouncements = [];

/* ======================================
LOAD ANNOUNCEMENTS
====================================== */

async function loadAnnouncements(){

try{

const response =
await fetch(`${SHEET_URL}/Announcements`);

const data =
await response.json();

allAnnouncements = data.reverse();

renderAnnouncements(allAnnouncements);

}

catch(error){

document
.getElementById("announcementContainer")
.innerHTML = `

<div class="empty">

Failed to Load Announcements

</div>

`;

}

}

/* ======================================
RENDER
====================================== */

function renderAnnouncements(data){

const container =
document.getElementById(
"announcementContainer"
);

container.innerHTML = "";

if(data.length == 0){

container.innerHTML = `

<div class="empty">

No Announcements Found

</div>

`;

return;

}

data.forEach(item=>{

let priorityClass = "low";

if(item.Priority == "High"){
priorityClass = "high";
}

if(item.Priority == "Medium"){
priorityClass = "medium";
}

container.innerHTML += `

<div class="announcementCard">

<div class="announcementHeader">

<div class="announcementTitle">

${item.Title}

</div>

<div class="priority ${priorityClass}">

${item.Priority}

</div>

</div>

<div class="announcementMessage">

${item.Message}

</div>

${
item.Attachment

?

`<a href="${item.Attachment}"
target="_blank"
class="attachmentBtn">

View Attachment

</a>`

:

""

}

<div class="announcementFooter">

<div>

📅 ${item.Date}

</div>

<div>

🏢 ${item.Department}

</div>

</div>

</div>

`;

});

}

/* ======================================
FILTER
====================================== */

function filterAnnouncements(){

const search =
document.getElementById("searchBox")
.value
.toLowerCase();

const priority =
document.getElementById("priorityFilter")
.value;

const filtered =
allAnnouncements.filter(item=>{

const matchSearch =

item.Title.toLowerCase().includes(search)

||

item.Message.toLowerCase().includes(search);

const matchPriority =

priority == ""

||

item.Priority == priority;

return (

matchSearch &&
matchPriority

);

});

renderAnnouncements(filtered);

}

/* ======================================
START
====================================== */

loadAnnouncements();

</script>
