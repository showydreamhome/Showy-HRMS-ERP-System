<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Admin Attendance
</title>

<link
rel="icon"
href="assets/logo.png">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#041638;
display:flex;
color:white;
}

/* SIDEBAR */

.sidebar{
width:260px;
height:100vh;
background:#071b46;
padding:25px 18px;
position:fixed;
left:0;
top:0;
overflow-y:auto;
}

.logo{
text-align:center;
margin-bottom:35px;
}

.logo img{
width:90px;
margin-bottom:10px;
}

.logo h2{
font-size:32px;
}

.menu{
display:flex;
flex-direction:column;
gap:14px;
}

.menu button{
padding:15px;
border:none;
border-radius:14px;
background:#17357a;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
text-align:left;
}

.menu button:hover{
background:#f5a000;
color:black;
transform:translateX(3px);
}

.active{
background:#f5a000 !important;
color:black !important;
}

.logoutBtn{
background:red !important;
color:white !important;
margin-top:20px;
}

.logoutBtn:hover{
background:#cc0000 !important;
}

/* MAIN */

.main{
margin-left:260px;
padding:35px;
width:100%;
}

/* TOP */

.topBar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
flex-wrap:wrap;
gap:20px;
}

.topBar h1{
font-size:48px;
}

/* STATS */

.stats{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:30px;
}

.statCard{
background:white;
color:black;
padding:25px;
border-radius:22px;
}

.statCard h2{
font-size:18px;
color:#666;
margin-bottom:15px;
}

.statCard p{
font-size:42px;
font-weight:bold;
color:#071b46;
}

/* FILTERS */

.filters{
display:flex;
gap:15px;
margin-bottom:25px;
flex-wrap:wrap;
}

.filters input,
.filters select{
padding:14px;
border:none;
border-radius:12px;
font-size:15px;
outline:none;
min-width:220px;
}

/* CARD */

.card{
background:white;
color:black;
padding:25px;
border-radius:24px;
overflow-x:auto;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

table th{
background:#071b46;
color:white;
padding:16px;
text-align:left;
font-size:15px;
}

table td{
padding:16px;
border-bottom:1px solid #ddd;
font-size:15px;
}

/* STATUS */

.present{
color:green;
font-weight:bold;
}

.absent{
color:red;
font-weight:bold;
}

.late{
color:#ff9900;
font-weight:bold;
}

/* BUTTON */

.exportBtn{
background:#f5a000;
color:black;
border:none;
padding:14px 20px;
border-radius:14px;
font-weight:bold;
font-size:16px;
cursor:pointer;
}

/* MOBILE */

@media(max-width:900px){

body{
display:block;
}

.sidebar{
position:relative;
width:100%;
height:auto;
}

.main{
margin-left:0;
padding:20px;
}

.topBar h1{
font-size:34px;
}

.filters{
flex-direction:column;
}

.filters input,
.filters select{
width:100%;
}

}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">

<img src="assets/logo.png">

<h2>
SHOWY
</h2>

</div>

<div class="menu">

<button onclick="window.location.href='admin-dashboard.html'">
Dashboard
</button>

<button onclick="window.location.href='admin-employees.html'">
Employees
</button>

<button class="active">
Attendance
</button>

<button onclick="window.location.href='admin-task-assign.html'">
Tasks
</button>

<button onclick="window.location.href='admin-announcements.html'">
Announcements
</button>

<button onclick="window.location.href='admin-vehicle-site-keys.html'">
Vehicle & Keys
</button>

<button onclick="window.location.href='admin-materials.html'">
Material Requests
</button>

<button onclick="window.location.href='admin-inventory.html'">
Inventory
</button>

<button onclick="window.location.href='admin-reports.html'">
Reports
</button>

<button
class="logoutBtn"
onclick="logout()">

Logout

</button>

</div>

</div>

<!-- MAIN -->

<div class="main">

<div class="topBar">

<h1>
Attendance Management
</h1>

<button
class="exportBtn"
onclick="exportAttendance()">

Export Report

</button>

</div>

<!-- STATS -->

<div class="stats">

<div class="statCard">

<h2>
Present Today
</h2>

<p id="presentCount">
0
</p>

</div>

<div class="statCard">

<h2>
Absent Today
</h2>

<p id="absentCount">
0
</p>

</div>

<div class="statCard">

<h2>
Late Entries
</h2>

<p id="lateCount">
0
</p>

</div>

</div>

<!-- FILTERS -->

<div class="filters">

<input
type="text"
id="searchInput"
placeholder="Search Employee"
onkeyup="filterAttendance()">

<select
id="statusFilter"
onchange="filterAttendance()">

<option value="">
All Status
</option>

<option value="Present">
Present
</option>

<option value="Absent">
Absent
</option>

<option value="Late">
Late
</option>

</select>

<input
type="date"
id="dateFilter"
onchange="filterAttendance()">

</div>

<!-- TABLE -->

<div class="card">

<table>

<thead>

<tr>

<th>Employee</th>
<th>Department</th>
<th>Date</th>
<th>Check In</th>
<th>Check Out</th>
<th>Status</th>
<th>Location</th>

</tr>

</thead>

<tbody id="attendanceTable">

<tr>

<td colspan="7">
Loading...
</td>

</tr>

</tbody>

</table>

</div>

</div>

<script>

/* ======================================
   AUTH CHECK
====================================== */

const employee =
JSON.parse(
localStorage.getItem("employee")
);

if(!employee){

window.location.href =
"index.html";

}

const role =
(employee.role || "")
.toLowerCase();

if(
role !== "admin" &&
role !== "super admin"
){

alert("Access Denied");

window.location.href =
"dashboard.html";

}

/* ======================================
   SHEET URL
====================================== */

const SHEET_URL =

"https://opensheet.elk.sh/1WgtFzzQTJ4-lRyrS0SURRH8fmMGqjK7Yt2ACDYmn0ZU/Attendance";

/* ======================================
   GLOBAL
====================================== */

let attendanceData = [];

/* ======================================
   LOAD ATTENDANCE
====================================== */

async function loadAttendance(){

const response =
await fetch(SHEET_URL);

attendanceData =
await response.json();

renderAttendance(attendanceData);

updateStats(attendanceData);

}

/* ======================================
   RENDER TABLE
====================================== */

function renderAttendance(data){

const table =
document.getElementById(
"attendanceTable"
);

if(data.length === 0){

table.innerHTML = `

<tr>
<td colspan="7">
No Attendance Data
</td>
</tr>

`;

return;

}

table.innerHTML = "";

data.reverse().forEach(item=>{

let statusClass = "";

if(item.Status === "Present"){
statusClass = "present";
}

else if(item.Status === "Late"){
statusClass = "late";
}

else{
statusClass = "absent";
}

table.innerHTML += `

<tr>

<td>
${item.Employee || "-"}
</td>

<td>
${item.Department || "-"}
</td>

<td>
${item.Date || "-"}
</td>

<td>
${item["Check In"] || "-"}
</td>

<td>
${item["Check Out"] || "-"}
</td>

<td class="${statusClass}">
${item.Status || "-"}
</td>

<td>
${item.Location || "-"}
</td>

</tr>

`;

});

}

/* ======================================
   STATS
====================================== */

function updateStats(data){

const present =
data.filter(
x => x.Status === "Present"
).length;

const absent =
data.filter(
x => x.Status === "Absent"
).length;

const late =
data.filter(
x => x.Status === "Late"
).length;

document.getElementById(
"presentCount"
).innerHTML = present;

document.getElementById(
"absentCount"
).innerHTML = absent;

document.getElementById(
"lateCount"
).innerHTML = late;

}

/* ======================================
   FILTER
====================================== */

function filterAttendance(){

const search =
document
.getElementById("searchInput")
.value
.toLowerCase();

const status =
document
.getElementById("statusFilter")
.value;

const date =
document
.getElementById("dateFilter")
.value;

const filtered =
attendanceData.filter(item=>{

const searchMatch =

(item.Employee || "")
.toLowerCase()
.includes(search);

const statusMatch =

status === "" ||

item.Status === status;

const dateMatch =

date === "" ||

item.Date === date;

return(
searchMatch &&
statusMatch &&
dateMatch
);

});

renderAttendance(filtered);

updateStats(filtered);

}

/* ======================================
   EXPORT
====================================== */

/* ======================================
   EXPORT ATTENDANCE EXCEL
====================================== */

async function exportAttendance(){

try{

/* FETCH DATA */

const response =
await fetch(SHEET_URL);

const data =
await response.json();

/* CHECK */

if(data.length === 0){

alert("No Attendance Data");

return;

}

/* EXCEL TABLE */

let excel = `

<table border="1">

<tr>

<th>Employee</th>
<th>Department</th>
<th>Date</th>
<th>Check In</th>
<th>Check Out</th>
<th>Status</th>
<th>Location</th>

</tr>

`;

/* LOOP */

data.forEach(item=>{

excel += `

<tr>

<td>${item.Employee || "-"}</td>

<td>${item.Department || "-"}</td>

<td>${item.Date || "-"}</td>

<td>${item["Check In"] || "-"}</td>

<td>${item["Check Out"] || "-"}</td>

<td>${item.Status || "-"}</td>

<td>${item.Location || "-"}</td>

</tr>

`;

});

/* CLOSE TABLE */

excel += `</table>`;

/* CREATE FILE */

const blob =
new Blob(
[excel],
{
type:
"application/vnd.ms-excel"
}
);

/* DOWNLOAD */

const url =
window.URL.createObjectURL(blob);

const a =
document.createElement("a");

a.href = url;

a.download =
"Attendance_Report.xls";

document.body.appendChild(a);

a.click();

document.body.removeChild(a);

window.URL.revokeObjectURL(url);

/* SUCCESS */

alert(
"Attendance Excel Downloaded"
);

}

/* ERROR */

catch(error){

console.log(error);

alert(
"Export Failed"
);

}

}

alert(
"Next Step:\nConnect Excel Export"
);


/* ======================================
   LOGOUT
====================================== */

function logout(){

localStorage.clear();

window.location.href =
"index.html";

}

/* ======================================
   START
====================================== */

loadAttendance();

</script>

</body>

</html>
