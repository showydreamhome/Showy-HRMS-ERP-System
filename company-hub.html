<!DOCTYPE html>
<html>

<head>

<title>Company Hub</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" href="assets/logo.png">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#041638;
color:white;
display:flex;
}

/* SIDEBAR */

.sidebar{
position:fixed;
width:250px;
height:100vh;
background:#071b46;
padding:25px 18px;
overflow-y:auto;
left:0;
top:0;
}

.logo{
text-align:center;
margin-bottom:35px;
}

.logo img{
width:90px;
}

.logo h2{
margin-top:10px;
font-size:30px;
color:white;
}

.menu{
margin-top:20px;
}

/* MENU BUTTON */

.menu-btn{
display:block;
width:100%;
padding:15px;
margin-bottom:12px;
border-radius:12px;
background:#0f2c6b;
color:white;
text-decoration:none;
font-size:16px;
font-weight:bold;
transition:0.3s;
text-align:left;
border:none;
cursor:pointer;
}

.menu-btn:hover{
background:#f5a000;
transform:translateX(3px);
}

/* ACTIVE */

.active{
background:#f5a000 !important;
color:black !important;
}

/* DROPDOWN */

.dropdown-btn{
display:block;
width:100%;
padding:15px;
margin-bottom:12px;
border-radius:12px;
background:#17357a;
color:#ffb400;
font-size:16px;
font-weight:bold;
border:none;
cursor:pointer;
text-align:left;
}

.dropdown-content{
display:none;
padding-left:10px;
margin-bottom:10px;
}

.dropdown-content a{
display:block;
padding:14px;
margin-bottom:10px;
border-radius:12px;
background:#0f2c6b;
color:white;
text-decoration:none;
font-weight:bold;
transition:0.3s;
}

.dropdown-content a:hover{
background:#f5a000;
color:black;
}

/* LOGOUT */

.logout-btn{
display:block;
width:100%;
padding:15px;
margin-top:25px;
border-radius:12px;
background:red;
color:white;
text-decoration:none;
font-size:16px;
font-weight:bold;
text-align:center;
transition:0.3s;
}

.logout-btn:hover{
background:#cc0000;
}

/* MAIN */

.main{
margin-left:250px;
padding:40px;
width:100%;
}

.title{
font-size:55px;
margin-bottom:30px;
}

/* CARD */

.card{
background:white;
color:black;
padding:25px;
border-radius:20px;
margin-bottom:20px;
}

.card h2{
margin-bottom:20px;
font-size:32px;
}

/* LINK BOX */

.linkBox{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px;
background:#f4f4f4;
border-radius:14px;
margin-bottom:15px;
flex-wrap:wrap;
gap:15px;
}

.left h3{
margin-bottom:6px;
font-size:22px;
}

.left p{
font-size:14px;
color:#555;
}

.actions{
display:flex;
gap:10px;
}

.actions button{
padding:12px 18px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
font-size:15px;
transition:0.3s;
}

.openBtn{
background:#0f2c6b;
color:white;
}

.openBtn:hover{
background:#173f99;
}

.copyBtn{
background:#f5a000;
color:black;
}

.copyBtn:hover{
opacity:0.9;
}

/* MOBILE */

@media(max-width:900px){

.sidebar{
width:100%;
height:auto;
position:relative;
}

.main{
margin-left:0;
padding:20px;
}

.title{
font-size:38px;
}

.card h2{
font-size:25px;
}

.linkBox{
flex-direction:column;
align-items:flex-start;
}

.actions{
width:100%;
}

.actions button{
width:100%;
}

}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">

<img src="assets/logo.png">

<h2>SHOWY</h2>

</div>

<div class="menu">

<!-- DASHBOARD -->

<a href="dashboard.html" class="menu-btn">
Dashboard
</a>

<a href="employee-movement.html" class="menu-btn">
 In & Out
</a>

<!-- HR -->

<button class="dropdown-btn" onclick="toggleDropdown('hrMenu')">
HR ▼
</button>

<div id="hrMenu" class="dropdown-content">

<a href="attendance.html">
Attendance
</a>

<a href="leave.html">
Leave Request
</a>

<a href="leave-status.html">
Leave Status
</a>

<a href="salary.html">
Salary
</a>

</div>

<!-- SITE OPERATIONS -->

<button class="dropdown-btn" onclick="toggleDropdown('siteMenu')">
Site Operations ▼
</button>

<div id="siteMenu" class="dropdown-content">

<a href="employee-movement.html">
Employee Movement
</a>

<a href="vehicle-site-keys.html">
Vehicle / Site Keys
</a>

<a href="daily-task.html">
Daily Tasks
</a>



</div>

<!-- INVENTORY -->

<button class="dropdown-btn" onclick="toggleDropdown('inventoryMenu')">
Inventory ▼
</button>

<div id="inventoryMenu" class="dropdown-content">

<a href="inventory.html">
Inventory
</a>

<a href="material-request.html">
Material Request
</a>

</div>

<!-- COMPANY -->

<a href="company-hub.html" class="menu-btn active">
Company Hub
</a>

<!-- LOGOUT -->

<a href="index.html" class="logout-btn">
Logout
</a>

</div>

</div>

<!-- MAIN -->

<div class="main">

<h1 class="title">
Company Hub
</h1>

<div class="card">

<h2>
Quick Access Links
</h2>

<div id="hubContainer">

</div>

</div>

</div>

<script>

/* DROPDOWN */

function toggleDropdown(id){

const menu =
document.getElementById(id);

if(menu.style.display === "block"){

menu.style.display = "none";

}else{

menu.style.display = "block";

}

}

/* LOGOUT */

function logout(){

localStorage.removeItem("employee");

window.location.href = "index.html";

}

/* LOAD HUB */

async function loadHub(){

const url =
"https://opensheet.elk.sh/1WgtFzzQTJ4-lRyrS0SURRH8fmMGqjK7Yt2ACDYmn0ZU/Company_Hub";

try{

const response =
await fetch(url);

const data =
await response.json();

const container =
document.getElementById("hubContainer");

container.innerHTML = "";

data.forEach(item => {

container.innerHTML += `

<div class="linkBox">

<div class="left">

<h3>${item.Name}</h3>

<p>${item.Category}</p>

</div>

<div class="actions">

<button
class="openBtn"
onclick="window.open('${item.URL}','_blank')">

Open

</button>

<button
class="copyBtn"
onclick="copyLink('${item.URL}')">

Copy

</button>

</div>

</div>

`;

});

}
catch(error){

console.log(error);

alert("Failed to load Company Hub");

}

}

/* COPY */

function copyLink(link){

navigator.clipboard.writeText(link);

alert("Link Copied");

}

/* START */

loadHub();

</script>

</body>

</html>
