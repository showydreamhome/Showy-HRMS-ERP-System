<!DOCTYPE html>
<html>

<head>

<title>Company Hub</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" href="assets/logo.png">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#041638;
color:white;
overflow-x:hidden;
}

/* SIDEBAR */

.sidebar{
position:fixed;
width:250px;
height:100vh;
background:#071b46;
padding:25px 18px;
overflow-y:auto;
left:0;
top:0;
}

.logo{
text-align:center;
margin-bottom:35px;
}

.logo img{
width:90px;
}

.logo h2{
margin-top:10px;
font-size:30px;
color:white;
}

.menu{
margin-top:20px;
}

/* MENU BUTTON */

.menu-btn{
display:block;
width:100%;
padding:15px;
margin-bottom:12px;
border-radius:12px;
background:#0f2c6b;
color:white;
text-decoration:none;
font-size:16px;
font-weight:bold;
transition:0.3s;
text-align:left;
border:none;
cursor:pointer;
}

.menu-btn:hover{
background:#f5a000;
transform:translateX(3px);
}

/* ACTIVE */

.active{
background:#f5a000 !important;
color:black !important;
}

/* DROPDOWN */

.dropdown-btn{
display:block;
width:100%;
padding:15px;
margin-bottom:12px;
border-radius:12px;
background:#17357a;
color:#ffb400;
font-size:16px;
font-weight:bold;
border:none;
cursor:pointer;
text-align:left;
transition:0.3s;
}

.dropdown-btn:hover{
background:#22489e;
}

/* DROPDOWN CONTENT */

.dropdown-content{
display:none;
padding-left:10px;
margin-bottom:10px;
}

.dropdown-content a{
display:block;
padding:14px;
margin-bottom:10px;
border-radius:12px;
background:#0f2c6b;
color:white;
text-decoration:none;
font-weight:bold;
transition:0.3s;
}

.dropdown-content a:hover{
background:#f5a000;
color:black;
}

/* LOGOUT */

.logout-btn{
display:block;
width:100%;
padding:15px;
margin-top:25px;
border-radius:12px;
background:red;
color:white;
text-decoration:none;
font-size:16px;
font-weight:bold;
text-align:center;
transition:0.3s;
}

.logout-btn:hover{
background:#cc0000;
}

/* MAIN */

.main{
margin-left:250px;
padding:40px;
width:calc(100% - 250px);
overflow-x:hidden;
}

/* TITLE */

.title{
font-size:55px;
margin-bottom:30px;
line-height:1.2;
}

/* CARD */

.card{
background:white;
color:black;
padding:25px;
border-radius:20px;
margin-bottom:20px;
}

.card h2{
margin-bottom:20px;
font-size:32px;
}

/* LINK BOX */

.linkBox{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
background:#f4f4f4;
border-radius:16px;
margin-bottom:15px;
gap:20px;
flex-wrap:wrap;
}

.left{
flex:1;
min-width:200px;
}

.left h3{
margin-bottom:6px;
font-size:24px;
word-break:break-word;
}

.left p{
font-size:14px;
color:#555;
word-break:break-word;
}

/* ACTIONS */

.actions{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.actions button{
padding:12px 18px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
font-size:15px;
transition:0.3s;
min-width:100px;
}

/* OPEN BUTTON */

.openBtn{
background:#0f2c6b;
color:white;
}

.openBtn:hover{
background:#173f99;
}

/* COPY BUTTON */

.copyBtn{
background:#f5a000;
color:black;
}

.copyBtn:hover{
opacity:0.9;
}

/* LOADER */

.loader{
text-align:center;
padding:30px;
font-size:18px;
color:#666;
}

/* =========================================
MOBILE RESPONSIVE
========================================= */

@media(max-width:900px){

body{
overflow-x:hidden;
}

/* SIDEBAR */

.sidebar{
position:relative;
width:100%;
height:auto;
padding:20px;
}

/* MAIN */

.main{
margin-left:0;
width:100%;
padding:20px;
}

/* TITLE */

.title{
font-size:36px;
margin-bottom:20px;
}

/* CARD */

.card{
padding:20px;
border-radius:18px;
}

.card h2{
font-size:26px;
}

/* LINK BOX */

.linkBox{
flex-direction:column;
align-items:flex-start;
padding:18px;
}

/* TEXT */

.left{
width:100%;
}

.left h3{
font-size:22px;
}

.left p{
font-size:14px;
}

/* BUTTONS */

.actions{
width:100%;
display:flex;
flex-direction:column;
gap:10px;
}

.actions button{
width:100%;
padding:14px;
font-size:16px;
}

/* MENU */

.menu-btn,
.dropdown-btn,
.logout-btn{
font-size:16px;
padding:16px;
}

/* LOGO */

.logo img{
width:75px;
}

.logo h2{
font-size:24px;
}

}

/* VERY SMALL DEVICES */

@media(max-width:480px){

.title{
font-size:30px;
}

.card h2{
font-size:22px;
}

.left h3{
font-size:20px;
}

.actions button{
font-size:15px;
padding:13px;
}

}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">

<img src="assets/logo.png">

<h2>SHOWY</h2>

</div>

<div class="menu">

<!-- DASHBOARD -->

<a href="dashboard.html" class="menu-btn">
Dashboard
</a>

<a href="employee-movement.html" class="menu-btn">
In & Out
</a>

<!-- HR -->

<button class="dropdown-btn" onclick="toggleDropdown('hrMenu')">
HR ▼
</button>

<div id="hrMenu" class="dropdown-content">

<a href="attendance.html">
Attendance
</a>

<a href="leave.html">
Leave Request
</a>

<a href="leave-status.html">
Leave Status
</a>

<a href="salary.html">
Salary
</a>

</div>

<!-- SITE OPERATIONS -->

<button class="dropdown-btn" onclick="toggleDropdown('siteMenu')">
Site Operations ▼
</button>

<div id="siteMenu" class="dropdown-content">

<a href="employee-movement.html">
Employee Movement
</a>

<a href="vehicle-site-keys.html">
Vehicle / Site Keys
</a>

<a href="daily-task.html">
Daily Tasks
</a>

</div>

<!-- INVENTORY -->

<button class="dropdown-btn" onclick="toggleDropdown('inventoryMenu')">
Inventory ▼
</button>

<div id="inventoryMenu" class="dropdown-content">

<a href="inventory.html">
Inventory
</a>

<a href="material-request.html">
Material Request
</a>

</div>

<!-- COMPANY -->

<a href="company-hub.html" class="menu-btn active">
Company Hub
</a>

<!-- LOGOUT -->

<a href="index.html" class="logout-btn">
Logout
</a>

</div>

</div>

<!-- MAIN -->

<div class="main">

<h1 class="title">
Company Hub
</h1>

<div class="card">

<h2>
Quick Access Links
</h2>

<div id="hubContainer">

<div class="loader">
Loading Company Links...
</div>

</div>

</div>

</div>

<script>

/* ======================================
DROPDOWN
====================================== */

function toggleDropdown(id){

const menu =
document.getElementById(id);

if(menu.style.display === "block"){

menu.style.display = "none";

}else{

menu.style.display = "block";

}

}

/* ======================================
LOGOUT
====================================== */

function logout(){

localStorage.removeItem("employee");

window.location.href = "index.html";

}

/* ======================================
LOAD COMPANY HUB
====================================== */

async function loadHub(){

const url =
"https://opensheet.elk.sh/1WgtFzzQTJ4-lRyrS0SURRH8fmMGqjK7Yt2ACDYmn0ZU/Company_Hub";

try{

const response =
await fetch(url);

const data =
await response.json();

const container =
document.getElementById("hubContainer");

container.innerHTML = "";

if(!data || data.length === 0){

container.innerHTML = `

<div class="loader">

No Company Links Found

</div>

`;

return;

}

data.forEach(item => {

container.innerHTML += `

<div class="linkBox">

<div class="left">

<h3>
${item.Name || "No Name"}
</h3>

<p>
${item.Category || "Company Link"}
</p>

</div>

<div class="actions">

<button
class="openBtn"
onclick="openLink('${item.URL}')">

Open

</button>

<button
class="copyBtn"
onclick="copyLink('${item.URL}')">

Copy

</button>

</div>

</div>

`;

});

}
catch(error){

console.log(error);

document.getElementById("hubContainer").innerHTML = `

<div class="loader">

Failed to Load Company Hub

</div>

`;

}

}

/* ======================================
OPEN LINK
====================================== */

function openLink(link){

if(!link || link === ""){

alert("Invalid Link");

return;

}

window.open(link,'_blank');

}

/* ======================================
COPY LINK
====================================== */

function copyLink(link){

navigator.clipboard.writeText(link);

alert("Link Copied");

}

/* ======================================
START
====================================== */

loadHub();

</script>

</body>

</html>
