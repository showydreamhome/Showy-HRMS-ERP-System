<!DOCTYPE html>
<html lang="en">

<head>

<title>Company Hub</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" href="assets/logo.png">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#041638;
color:white;
overflow-x:hidden;
}

/* MOBILE TOPBAR */

.mobileTopbar{
display:none;
}

/* OVERLAY */

.overlay{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
z-index:1400;
}

.overlay.show{
display:block;
}

/* SIDEBAR */

.sidebar{
position:fixed;
width:250px;
height:100vh;
background:#071b46;
padding:25px 18px;
overflow-y:auto;
left:0;
top:0;
z-index:1500;
transition:0.3s;
}

.logo{
text-align:center;
margin-bottom:35px;
}

.logo img{
width:90px;
}

.logo h2{
margin-top:10px;
font-size:30px;
color:white;
}

.menu{
margin-top:20px;
}

/* MENU BUTTON */

.menu-btn{
display:block;
width:100%;
padding:15px;
margin-bottom:12px;
border-radius:12px;
background:#0f2c6b;
color:white;
text-decoration:none;
font-size:16px;
font-weight:bold;
transition:0.3s;
text-align:left;
border:none;
cursor:pointer;
}

.menu-btn:hover{
background:#f5a000;
color:black;
}

.active{
background:#f5a000 !important;
color:black !important;
}

/* DROPDOWN */

.dropdown-btn{
display:block;
width:100%;
padding:15px;
margin-bottom:12px;
border-radius:12px;
background:#17357a;
color:#ffb400;
font-size:16px;
font-weight:bold;
border:none;
cursor:pointer;
text-align:left;
transition:0.3s;
}

.dropdown-btn:hover{
background:#22489e;
}

.dropdown-content{
display:none;
padding-left:10px;
margin-bottom:10px;
}

.dropdown-content a{
display:block;
padding:14px;
margin-bottom:10px;
border-radius:12px;
background:#0f2c6b;
color:white;
text-decoration:none;
font-weight:bold;
transition:0.3s;
}

.dropdown-content a:hover{
background:#f5a000;
color:black;
}

/* LOGOUT */

.logout-btn{
display:block;
width:100%;
padding:15px;
margin-top:25px;
border-radius:12px;
background:red;
color:white;
text-decoration:none;
font-size:16px;
font-weight:bold;
text-align:center;
transition:0.3s;
}

.logout-btn:hover{
background:#cc0000;
}

/* MAIN */

.main{
margin-left:250px;
padding:40px;
width:calc(100% - 250px);
}

/* TITLE */

.title{
font-size:50px;
margin-bottom:30px;
}

/* CARD */

.card{
background:white;
color:black;
padding:25px;
border-radius:20px;
margin-bottom:20px;
}

.card h2{
margin-bottom:20px;
font-size:32px;
}

/* LINK BOX */

.linkBox{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
background:#f4f4f4;
border-radius:16px;
margin-bottom:15px;
gap:20px;
flex-wrap:wrap;
}

.left{
flex:1;
}

.left h3{
margin-bottom:6px;
font-size:24px;
word-break:break-word;
}

.left p{
font-size:14px;
color:#555;
word-break:break-word;
}

/* ACTIONS */

.actions{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.actions button{
padding:12px 18px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
font-size:15px;
transition:0.3s;
}

/* BUTTONS */

.openBtn{
background:#0f2c6b;
color:white;
}

.openBtn:hover{
background:#173f99;
}

.copyBtn{
background:#f5a000;
color:black;
}

.copyBtn:hover{
opacity:0.9;
}

/* LOADER */

.loader{
text-align:center;
padding:30px;
font-size:18px;
color:#666;
}

/* =========================================
MOBILE
========================================= */

@media screen and (max-width:768px){

.mobileTopbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
background:#071b46;
position:sticky;
top:0;
z-index:1600;
}

.mobileLogo{
font-size:28px;
font-weight:bold;
}

.menuIcon{
font-size:34px;
cursor:pointer;
}

.sidebar{
left:-100%;
width:280px;
}

.sidebar.show{
left:0;
}

.main{
margin-left:0;
width:100%;
padding:20px;
}

.title{
font-size:34px;
}

.card{
padding:20px;
border-radius:18px;
}

.card h2{
font-size:24px;
}

.linkBox{
flex-direction:column;
align-items:flex-start;
}

.left{
width:100%;
}

.left h3{
font-size:22px;
}

.actions{
width:100%;
display:flex;
flex-direction:column;
}

.actions button{
width:100%;
padding:14px;
font-size:16px;
}

.menu-btn,
.dropdown-btn,
.logout-btn{
font-size:16px;
padding:16px;
}

.logo img{
width:75px;
}

.logo h2{
font-size:24px;
}

}

</style>

</head>

<body>

<!-- MOBILE TOPBAR -->

<div class="mobileTopbar">

<div class="mobileLogo">
SHOWY
</div>

<div class="menuIcon" onclick="openSidebar()">
☰
</div>

</div>

<!-- OVERLAY -->

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">

<img src="assets/logo.png">

<h2>SHOWY</h2>

</div>

<div class="menu">

<a href="dashboard.html" class="menu-btn">
Dashboard
</a>

<a href="employee-movement.html" class="menu-btn">
In & Out
</a>

<button class="dropdown-btn" onclick="toggleDropdown('hrMenu')">
HR ▼
</button>

<div id="hrMenu" class="dropdown-content">

<a href="attendance.html">
Attendance
</a>

<a href="leave.html">
Leave Request
</a>

<a href="leave-status.html">
Leave Status
</a>

<a href="salary.html">
Salary
</a>

</div>

<button class="dropdown-btn" onclick="toggleDropdown('siteMenu')">
Site Operations ▼
</button>

<div id="siteMenu" class="dropdown-content">

<a href="employee-movement.html">
Employee Movement
</a>

<a href="vehicle-site-keys.html">
Vehicle / Site Keys
</a>

<a href="daily-task.html">
Daily Tasks
</a>

</div>

<button class="dropdown-btn" onclick="toggleDropdown('inventoryMenu')">
Inventory ▼
</button>

<div id="inventoryMenu" class="dropdown-content">

<a href="inventory.html">
Inventory
</a>

<a href="material-request.html">
Material Request
</a>

</div>

<a href="company-hub.html" class="menu-btn active">
Company Hub
</a>

<a href="index.html" class="logout-btn">
Logout
</a>

</div>

</div>

<!-- MAIN -->

<div class="main">

<h1 class="title">
Company Hub
</h1>

<div class="card">

<h2>
Quick Access Links
</h2>

<div id="hubContainer">

<div class="loader">
Loading Company Links...
</div>

</div>

</div>

</div>

<script>

/* MOBILE SIDEBAR */

function openSidebar(){

document.querySelector(".sidebar")
.classList.add("show");

document.getElementById("overlay")
.classList.add("show");

}

function closeSidebar(){

document.querySelector(".sidebar")
.classList.remove("show");

document.getElementById("overlay")
.classList.remove("show");

}

/* DROPDOWN */

function toggleDropdown(id){

const menu =
document.getElementById(id);

if(menu.style.display === "block"){

menu.style.display = "none";

}else{

menu.style.display = "block";

}

}

/* LOAD HUB */

async function loadHub(){

const url =
"https://opensheet.elk.sh/1WgtFzzQTJ4-lRyrS0SURRH8fmMGqjK7Yt2ACDYmn0ZU/Company_Hub";

try{

const response =
await fetch(url);

const data =
await response.json();

const container =
document.getElementById("hubContainer");

container.innerHTML = "";

if(data.length === 0){

container.innerHTML = `

<div class="loader">
No Company Links Found
</div>

`;

return;

}

data.forEach(item => {

container.innerHTML += `

<div class="linkBox">

<div class="left">

<h3>
${item.Name || "No Name"}
</h3>

<p>
${item.Category || "Company Link"}
</p>

</div>

<div class="actions">

<button
class="openBtn"
onclick="window.open('${item.URL}','_blank')">

Open

</button>

<button
class="copyBtn"
onclick="copyLink('${item.URL}')">

Copy

</button>

</div>

</div>

`;

});

}
catch(error){

console.log(error);

document.getElementById("hubContainer").innerHTML = `

<div class="loader">
Failed to Load Company Hub
</div>

`;

}

}

/* COPY LINK */

function copyLink(link){

navigator.clipboard.writeText(link);

alert("Link Copied");

}

/* START */

loadHub();

</script>

</body>

</html>
