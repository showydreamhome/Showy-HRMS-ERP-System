<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Monthly Attendance
</title>

<link
rel="icon"
href="assets/logo.png">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#041638;
display:flex;
overflow:hidden;
}

/* =========================
SIDEBAR
========================= */

.sidebar{
width:240px;
height:100vh;
background:#071b46;
padding:20px 15px;
position:fixed;
left:0;
top:0;
overflow-y:auto;
}

.logo{
text-align:center;
margin-bottom:30px;
color:white;
}

.logo img{
width:80px;
margin-bottom:10px;
}

.logo h2{
font-size:32px;
}

.menu{
display:flex;
flex-direction:column;
gap:12px;
}

.menu-btn{
padding:14px;
border-radius:12px;
background:#17357a;
color:white;
text-decoration:none;
font-weight:bold;
transition:0.3s;
}

.menu-btn:hover{
background:#f5a000;
color:black;
}

.active{
background:#f5a000;
color:black;
}

.logout-btn{
background:red;
}

/* =========================
MAIN
========================= */

.main{
margin-left:240px;
width:calc(100% - 240px);
height:100vh;
overflow:auto;
padding:25px;
}

.card{
background:white;
border-radius:24px;
padding:30px;
}

.card h1{
font-size:72px;
margin-bottom:30px;
color:#071b46;
}

/* =========================
TOP BAR
========================= */

.topBar{
display:flex;
gap:15px;
flex-wrap:wrap;
margin-bottom:30px;
}

.topBar select,
.topBar input{
padding:16px;
border-radius:14px;
border:1px solid #ccc;
font-size:16px;
min-width:220px;
outline:none;
}

.btn{
padding:16px 28px;
border:none;
border-radius:14px;
background:#071b46;
color:white;
font-weight:bold;
cursor:pointer;
font-size:16px;
}

.btn:hover{
opacity:0.9;
}

/* =========================
STATS
========================= */

.stats{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:30px;
}

.statBox{
background:#f5f5f5;
padding:28px;
border-radius:20px;
}

.statBox h3{
font-size:20px;
color:#666;
margin-bottom:10px;
}

.statBox h2{
font-size:56px;
color:#071b46;
}

/* =========================
TABLE
========================= */

.tableWrapper{
overflow:auto;
border-radius:20px;
border:1px solid #ddd;
background:white;
}

table{
border-collapse:collapse;
min-width:2000px;
width:100%;
}

thead th{
background:#071b46;
color:white;
padding:18px;
text-align:center;
font-size:15px;
position:sticky;
top:0;
z-index:5;
}

tbody td{
padding:14px;
border-bottom:1px solid #eee;
text-align:center;
background:white;
}

/* EMPLOYEE COLUMN */

.sticky-col{
position:sticky;
left:0;
background:white;
z-index:4;
min-width:320px;
text-align:left;
}

/* EMPLOYEE CARD */

.empName{
font-size:18px;
font-weight:bold;
color:#111;
margin-bottom:5px;
}

.empEmail{
font-size:13px;
color:#666;
}

/* BADGES */

.badge{
padding:10px 12px;
border-radius:12px;
font-weight:bold;
display:inline-block;
min-width:72px;
font-size:15px;
text-align:center;
}

.p{
background:#d9f7d9;
color:green;
}

.a{
background:#ffd9d9;
color:red;
}

.wo{
background:#ead9ff;
color:#6a00ff;
}

.ph{
background:#d9e8ff;
color:#005eff;
}

.h{
background:#fff2c9;
color:#ff9800;
}

/* =========================
MOBILE
========================= */

@media(max-width:1000px){

body{
display:block;
overflow:auto;
}

.sidebar{
position:relative;
width:100%;
height:auto;
}

.main{
margin-left:0;
width:100%;
padding:15px;
}

.card h1{
font-size:40px;
}

.topBar{
flex-direction:column;
}

.topBar select,
.topBar input,
.btn{
width:100%;
}

}

</style>

</head>

<body>

<!-- =========================
SIDEBAR
========================= -->

<div class="sidebar">

<div class="logo">

<img src="assets/logo.png">

<h2>
SHOWY
</h2>

</div>

<div class="menu">

<a href="hr-dashboard.html"
class="menu-btn">

Dashboard

</a>

<a href="hr-employees.html"
class="menu-btn">

Employees

</a>

<a href="hr-attendance.html"
class="menu-btn active">

Attendance

</a>

<a href="hr-leaves.html"
class="menu-btn">

Leave Requests

</a>

<a href="hr-salary.html"
class="menu-btn">

Salary

</a>

<a href="hr-reports.html"
class="menu-btn">

Reports

</a>

<a href="index.html"
class="menu-btn logout-btn">

Logout

</a>

</div>

</div>

<!-- =========================
MAIN
========================= -->

<div class="main">

<div class="card">

<h1>
Monthly Attendance
</h1>

<!-- =========================
TOP BAR
========================= -->

<div class="topBar">

<select id="monthSelect">

<option value="May_2026">
May 2026
</option>

<option value="June_2026">
June 2026
</option>

<option value="July_2026">
July 2026
</option>

</select>

<select id="daySelect">

<option value="">
Select Day
</option>

</select>

<input
type="text"
id="searchInput"
placeholder="Search Employee">

<button
class="btn"
onclick="loadAttendance()">

Load Attendance

</button>

</div>

<!-- =========================
STATS
========================= -->

<div class="stats">

<div class="statBox">

<h3>
Total Employees
</h3>

<h2 id="totalEmployees">
0
</h2>

</div>

<div class="statBox">

<h3 id="presentLabel">
Present
</h3>

<h2 id="presentCount">
0
</h2>

</div>

<div class="statBox">

<h3>
Absent
</h3>

<h2 id="absentCount">
0
</h2>

</div>

<div class="statBox">

<h3>
Week Off
</h3>

<h2 id="woCount">
0
</h2>

</div>

</div>

<!-- =========================
TABLE
========================= -->

<div class="tableWrapper">

<table>

<thead>

<tr id="tableHead">

<th class="sticky-col">
Employee
</th>

</tr>

</thead>

<tbody id="attendanceBody">

<tr>

<td colspan="32"
style="padding:30px;text-align:center;">

Loading Attendance...

</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>

<script>

/* =========================
AUTH
========================= */

const employee =
JSON.parse(
localStorage.getItem("employee")
);

if(!employee){

window.location.href =
"index.html";

}

const role =
(employee.role || "")
.toLowerCase();

if(role !== "hr"){

alert("Access Denied");

window.location.href =
"index.html";

}

/* =========================
SHEET
========================= */

const SHEET_ID =
"1WgtFzzQTJ4-lRyrS0SURRH8fmMGqjK7Yt2ACDYmn0ZU";

const EMPLOYEE_URL =
`https://opensheet.elk.sh/${SHEET_ID}/Employee_Data`;

/* =========================
GLOBAL
========================= */

let employeeMap = {};
let attendanceData = [];

/* =========================
LOAD DAYS
========================= */

function loadDays(){

const daySelect =
document.getElementById(
"daySelect"
);

daySelect.innerHTML =
`<option value="">Select Day</option>`;

for(let i=1;i<=31;i++){

daySelect.innerHTML += `

<option value="${i}">
${i}
</option>

`;

}

}

loadDays();

/* =========================
LOAD ATTENDANCE
========================= */

async function loadAttendance(){

const month =
document.getElementById(
"monthSelect"
).value;

const url =
`https://opensheet.elk.sh/${SHEET_ID}/${month}`;

try{

/* EMPLOYEE DATA */

const empRes =
await fetch(EMPLOYEE_URL);

const empData =
await empRes.json();

employeeMap = {};

empData.forEach(item=>{

const email =
(item.Email || "")
.trim();

employeeMap[email] = {

name:
item.Name || "-",

department:
item.Department || "-"

};

});

/* ATTENDANCE DATA */

const response =
await fetch(url);

attendanceData =
await response.json();

renderTable();

updateStats();

}
catch(error){

console.log(error);

alert(
"Failed To Load Attendance"
);

}

}

/* =========================
STATUS CLASS
========================= */

function getClass(status){

status =
(status || "")
.toUpperCase()
.trim();

if(status === "P")
return "p";

if(status === "A")
return "a";

if(status === "WO")
return "wo";

if(status === "P-1/2")
return "ph";

if(status === "H")
return "h";

return "";

}

/* =========================
RENDER TABLE
========================= */

function renderTable(){

const body =
document.getElementById(
"attendanceBody"
);

const head =
document.getElementById(
"tableHead"
);

const search =
document.getElementById(
"searchInput"
).value.toLowerCase();

const monthText =
document.getElementById(
"monthSelect"
).options[
document.getElementById(
"monthSelect"
).selectedIndex
].text;

const monthName =
monthText.split(" ")[0];

/* HEADER */

head.innerHTML = `

<th class="sticky-col">
Employee
</th>

`;

for(let i=1;i<=31;i++){

head.innerHTML += `

<th>
${monthName} ${i}
</th>

`;

}

/* BODY */

body.innerHTML = "";

attendanceData.forEach(row=>{

const email =
(row.Email || "").trim();

const emp =
employeeMap[email] || {};

const name =
emp.name || "-";

if(

!name.toLowerCase()
.includes(search)

&&

!email.toLowerCase()
.includes(search)

){
return;
}

let tr = `

<tr>

<td class="sticky-col">

<div class="empName">
${name}
</div>

<div class="empEmail">
${email}
</div>

</td>

`;

for(let i=1;i<=31;i++){

const value =
row[`${monthName} ${i}`] || "";

tr += `

<td>

<div class="
badge
${getClass(value)}
">

${value}

</div>

</td>

`;

}

tr += `</tr>`;

body.innerHTML += tr;

});

}

/* =========================
UPDATE STATS
========================= */

function updateStats(){

const selectedDay =
document.getElementById(
"daySelect"
).value;

document.getElementById(
"totalEmployees"
).innerText =
attendanceData.length;

if(selectedDay === ""){

document.getElementById(
"presentLabel"
).innerText =
"Present";

document.getElementById(
"presentCount"
).innerText = 0;

document.getElementById(
"absentCount"
).innerText = 0;

document.getElementById(
"woCount"
).innerText = 0;

return;

}

const monthText =
document.getElementById(
"monthSelect"
).options[
document.getElementById(
"monthSelect"
).selectedIndex
].text;

const monthName =
monthText.split(" ")[0];

let present = 0;
let absent = 0;
let wo = 0;

attendanceData.forEach(row=>{

const value =
(row[`${monthName} ${selectedDay}`] || "")
.toUpperCase()
.trim();

if(value === "P")
present++;

if(value === "A")
absent++;

if(value === "WO")
wo++;

});

document.getElementById(
"presentLabel"
).innerText =
`${monthName} ${selectedDay} Present`;

document.getElementById(
"presentCount"
).innerText =
present;

document.getElementById(
"absentCount"
).innerText =
absent;

document.getElementById(
"woCount"
).innerText =
wo;

}

/* =========================
EVENTS
========================= */

document.getElementById(
"daySelect"
).addEventListener(
"change",
updateStats
);

document.getElementById(
"searchInput"
).addEventListener(
"keyup",
renderTable
);

/* =========================
START
========================= */

loadAttendance();

</script>

</body>

</html>
