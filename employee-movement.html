<script>

/* ======================================
SIDEBAR
====================================== */

function openSidebar(){

document
.getElementById("sidebar")
.classList.toggle("show");

}

/* ======================================
DROPDOWN
====================================== */

function toggleDropdown(id){

document
.getElementById(id)
.classList.toggle("show");

}

/* ======================================
SCRIPT URL
====================================== */

const SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbyFx70qjoYYPeer9JMMvcXKiswUXe0HUJDaRSEGZeUVLjdOCKOQ2icoKCaPlWPEVImwXg/exec";

/* ======================================
EMPLOYEE
====================================== */

const employee =
JSON.parse(localStorage.getItem("employee"));

if(!employee){

window.location.href =
"index.html";

}

document.getElementById("employee").value =
employee.name || employee.Name || "";

/* ======================================
LOAD PROJECTS
====================================== */

loadProjects();

function loadProjects(){

if(!navigator.onLine){

return;

}

const callbackName =
"projectCallback_" + Date.now();

window[callbackName] = function(response){

const dropdown =
document.getElementById("project");

dropdown.innerHTML = "";

if(response.success){

const defaultOption =
document.createElement("option");

defaultOption.value = "";

defaultOption.textContent =
"Select Project";

dropdown.appendChild(defaultOption);

response.projects.forEach(project => {

const option =
document.createElement("option");

option.value = project;

option.textContent = project;

dropdown.appendChild(option);

});

}
else{

dropdown.innerHTML =
'<option>Projects Not Found</option>';

}

};

const script =
document.createElement("script");

script.src =
SCRIPT_URL +
"?action=projects&callback=" +
callbackName;

document.body.appendChild(script);

}

/* ======================================
SEND MOVEMENT
====================================== */

function sendMovement(status){

if(!navigator.onLine){

alert(
"Please turn ON internet connection"
);

return;

}

const employee =
document.getElementById("employee").value;

const project =
document.getElementById("project").value;

const purpose =
document.getElementById("purpose").value;

if(project == ""){

alert("Select Project");

return;

}

navigator.geolocation.getCurrentPosition(

async function(position){

const latitude =
position.coords.latitude;

const longitude =
position.coords.longitude;

const payload = {

type:"employeeMovement",

employee:employee,

status:status,

project:project,

purpose:purpose,

latitude:latitude,

longitude:longitude

};

try{

const response =
await fetch(SCRIPT_URL,{

method:"POST",

body:JSON.stringify(payload)

});

const result =
await response.json();

if(result.success){

alert(status + " Submitted Successfully");

}
else{

alert("Submission Failed");

}

}
catch(error){

console.log(error);

alert("Error Sending Data");

}

},

function(){

alert("Enable GPS Location");

}

);

}

/* ======================================
INTERNET CHECK
====================================== */

function checkInternet(){

const popup =
document.getElementById(
"internetPopup"
);

if(navigator.onLine){

popup.style.display = "none";

}
else{

popup.style.display = "flex";

}

}

/* CHECK CONTINUOUSLY */

window.addEventListener(
"online",
checkInternet
);

window.addEventListener(
"offline",
checkInternet
);

/* START CHECK */

checkInternet();

</script>
