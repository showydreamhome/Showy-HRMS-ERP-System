<!DOCTYPE html>
<html lang="en">

<head>

<title>Showy Salary</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" href="assets/logo.png">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#041638;
color:white;
overflow-x:hidden;
}

/* MOBILE TOPBAR */

.mobileTopbar{
display:none;
}

/* OVERLAY */

.overlay{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
z-index:1400;
}

.overlay.show{
display:block;
}

/* SIDEBAR */

.sidebar{
position:fixed;
width:250px;
height:100vh;
background:#071b46;
padding:25px 18px;
overflow-y:auto;
left:0;
top:0;
z-index:1500;
transition:0.3s;
}

.logo{
text-align:center;
margin-bottom:35px;
}

.logo img{
width:90px;
}

.logo h2{
margin-top:10px;
font-size:30px;
color:white;
}

.menu{
margin-top:20px;
}

/* BUTTONS */

.menu-btn{
display:block;
width:100%;
padding:15px;
margin-bottom:12px;
border-radius:12px;
background:#0f2c6b;
color:white;
text-decoration:none;
font-size:16px;
font-weight:bold;
text-align:left;
border:none;
cursor:pointer;
transition:0.3s;
}

.menu-btn:hover{
background:#f5a000;
color:black;
}

.active{
background:#f5a000 !important;
color:black !important;
}

/* DROPDOWN */

.dropdown-btn{
display:block;
width:100%;
padding:15px;
margin-bottom:12px;
border-radius:12px;
background:#17357a;
color:#ffb400;
font-size:16px;
font-weight:bold;
border:none;
cursor:pointer;
text-align:left;
}

.dropdown-content{
display:none;
padding-left:10px;
margin-bottom:10px;
}

.dropdown-content a{
display:block;
padding:14px;
margin-bottom:10px;
border-radius:12px;
background:#0f2c6b;
color:white;
text-decoration:none;
font-weight:bold;
transition:0.3s;
}

.dropdown-content a:hover{
background:#f5a000;
color:black;
}

/* LOGOUT */

.logout-btn{
display:block;
width:100%;
padding:15px;
margin-top:25px;
border-radius:12px;
background:red;
color:white;
text-decoration:none;
font-size:16px;
font-weight:bold;
text-align:center;
}

/* MAIN */

.main{
margin-left:250px;
padding:30px;
width:calc(100% - 250px);
}

/* TOP */

.top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
gap:20px;
flex-wrap:wrap;
}

.top h1{
font-size:55px;
line-height:1.2;
}

/* NAV */

.nav{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.nav button{
padding:12px 20px;
border:none;
border-radius:12px;
cursor:pointer;
font-size:18px;
font-weight:bold;
}

/* CARD */

.salaryCard{
background:white;
color:black;
padding:35px;
border-radius:20px;
width:100%;
max-width:850px;
overflow:hidden;
}

.salaryCard h1{
font-size:55px;
margin-bottom:10px;
word-break:break-word;
}

.salaryCard h2{
margin-bottom:20px;
}

.salaryCard h3{
margin-top:18px;
font-size:28px;
word-break:break-word;
}

.salaryCard hr{
margin:20px 0;
}

/* DOWNLOAD */

.downloadBtn{
margin-top:30px;
padding:15px 25px;
background:#f5a000;
border:none;
border-radius:12px;
font-size:18px;
font-weight:bold;
cursor:pointer;
width:100%;
}

.downloadBtn:hover{
opacity:0.9;
}

/* MOBILE */

@media screen and (max-width:768px){

.mobileTopbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
background:#071b46;
position:sticky;
top:0;
z-index:1600;
}

.mobileLogo{
font-size:28px;
font-weight:bold;
}

.menuIcon{
font-size:34px;
cursor:pointer;
}

.sidebar{
left:-100%;
width:280px;
}

.sidebar.show{
left:0;
}

.main{
margin-left:0;
width:100%;
padding:20px;
}

.top{
flex-direction:column;
align-items:flex-start;
}

.top h1{
font-size:36px;
}

.nav{
width:100%;
}

.nav button{
flex:1;
font-size:16px;
padding:14px;
}

.salaryCard{
padding:25px;
border-radius:18px;
}

.salaryCard h1{
font-size:40px;
}

.salaryCard h2{
font-size:22px;
}

.salaryCard h3{
font-size:22px;
line-height:1.5;
}

.downloadBtn{
font-size:16px;
padding:15px;
}

.menu-btn,
.dropdown-btn,
.logout-btn{
font-size:16px;
padding:16px;
}

.logo img{
width:75px;
}

.logo h2{
font-size:24px;
}

}

/* SMALL DEVICES */

@media screen and (max-width:480px){

.top h1{
font-size:30px;
}

.salaryCard h1{
font-size:32px;
}

.salaryCard h3{
font-size:18px;
}

}

</style>

</head>

<body>

<!-- MOBILE TOPBAR -->

<div class="mobileTopbar">

<div class="mobileLogo">
SHOWY
</div>

<div class="menuIcon" onclick="openSidebar()">
☰
</div>

</div>

<!-- OVERLAY -->

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">

<img src="assets/logo.png">

<h2>SHOWY</h2>

</div>

<div class="menu">

<a href="dashboard.html" class="menu-btn">
Dashboard
</a>

<a href="employee-movement.html" class="menu-btn">
In & Out
</a>

<button class="dropdown-btn" onclick="toggleDropdown('hrMenu')">
HR ▼
</button>

<div id="hrMenu" class="dropdown-content" style="display:block;">

<a href="attendance.html">
Attendance
</a>

<a href="leave.html">
Leave Request
</a>

<a href="leave-status.html">
Leave Status
</a>

<a href="salary.html" class="menu-btn active">
Salary
</a>

</div>

<button class="dropdown-btn" onclick="toggleDropdown('siteMenu')">
Site Operations ▼
</button>

<div id="siteMenu" class="dropdown-content">

<a href="vehicle-site-keys.html">
Vehicle / Site Keys
</a>

<a href="daily-task.html">
Daily Tasks
</a>

</div>

<button class="dropdown-btn" onclick="toggleDropdown('inventoryMenu')">
Inventory ▼
</button>

<div id="inventoryMenu" class="dropdown-content">

<a href="inventory.html">
Inventory
</a>

</div>

<a href="company-hub.html" class="menu-btn">
Company Hub
</a>

<a href="index.html" class="logout-btn">
Logout
</a>

</div>

</div>

<!-- MAIN -->

<div class="main">

<div class="top">

<h1>
Salary Slip
</h1>

<div class="nav">

<button onclick="changeMonth(-1)">
⬅ Prev
</button>

<button onclick="changeMonth(1)">
Next ➡
</button>

</div>

</div>

<!-- CARD -->

<div class="salaryCard">

<h1 id="employeeName">
Employee Name
</h1>

<h2 id="salaryMonth">
May 2026
</h2>

<hr>

<h3>
Monthly Salary :
₹ <span id="monthlySalary">0</span>
</h3>

<h3>
Paid Days :
<span id="paidDays">0</span>
</h3>

<h3>
Absent Days :
<span id="absentDays">0</span>
</h3>

<h3>
Final Salary :
₹ <span id="finalSalary">0</span>
</h3>

<button class="downloadBtn">
Download Salary Slip
</button>

</div>

</div>

<script>

/* MOBILE SIDEBAR */

function openSidebar(){

document.querySelector(".sidebar")
.classList.add("show");

document.getElementById("overlay")
.classList.add("show");

}

function closeSidebar(){

document.querySelector(".sidebar")
.classList.remove("show");

document.getElementById("overlay")
.classList.remove("show");

}

/* DROPDOWN */

function toggleDropdown(id){

const menu =
document.getElementById(id);

if(menu.style.display === "block"){

menu.style.display = "none";

}else{

menu.style.display = "block";

}

}

</script>

</body>

</html>
