<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
HR Salary Management
</title>

<link
rel="icon"
href="assets/logo.png">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#041638;
display:flex;
color:white;
overflow:hidden;
}

/* SIDEBAR */

.sidebar{
width:240px;
height:100vh;
background:#071b46;
padding:20px 15px;
position:fixed;
left:0;
top:0;
overflow-y:auto;
}

.logo{
text-align:center;
margin-bottom:30px;
}

.logo img{
width:80px;
margin-bottom:10px;
}

.logo h2{
font-size:32px;
}

/* MENU */

.menu{
display:flex;
flex-direction:column;
gap:12px;
}

.menu-btn{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#17357a;
color:white;
font-size:15px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
text-align:left;
text-decoration:none;
display:block;
}

.menu-btn:hover{
background:#f5a000;
color:black;
transform:translateX(3px);
}

.active{
background:#f5a000 !important;
color:black !important;
}

.logout-btn{
background:red !important;
color:white !important;
margin-top:10px;
}

.logout-btn:hover{
background:#cc0000 !important;
}

/* MAIN */

.main{
margin-left:240px;
padding:25px;
width:calc(100% - 240px);
height:100vh;
overflow-y:auto;
}

/* CARD */

.card{
background:white;
padding:30px;
border-radius:24px;
color:black;
}

.card h1{
font-size:54px;
margin-bottom:25px;
}

/* STATS */

.stats{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:30px;
}

.statBox{
background:#f5f5f5;
padding:25px;
border-radius:18px;
}

.statBox h3{
font-size:18px;
color:#666;
margin-bottom:10px;
}

.statBox h2{
font-size:40px;
color:#071b46;
}

/* SEARCH */

.searchBox{
margin-bottom:20px;
}

.searchBox input{
width:100%;
padding:16px;
border:1px solid #ccc;
border-radius:14px;
font-size:16px;
outline:none;
}

/* TABLE */

.tableWrapper{
overflow-x:auto;
border-radius:18px;
border:1px solid #ddd;
}

table{
width:100%;
border-collapse:collapse;
min-width:1600px;
}

table th{
background:#071b46;
color:white;
padding:18px;
font-size:15px;
text-align:left;
white-space:nowrap;
}

table td{
padding:18px;
border-bottom:1px solid #ddd;
font-size:15px;
white-space:nowrap;
}

/* INPUT */

.inputField{
padding:10px;
border:1px solid #ccc;
border-radius:10px;
width:120px;
outline:none;
font-size:14px;
}

/* BUTTONS */

.actionButtons{
display:flex;
gap:10px;
}

.actionBtn{
padding:10px 16px;
border:none;
border-radius:10px;
font-size:14px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.saveBtn{
background:#071b46;
color:white;
}

.saveBtn:hover{
background:#0f2c6b;
}

.paidBtn{
background:green;
color:white;
}

.paidBtn:hover{
background:#006d00;
}

/* STATUS */

.paid{
color:green;
font-weight:bold;
}

.pending{
color:#ff9800;
font-weight:bold;
}

/* MOBILE */

@media(max-width:1000px){

body{
display:block;
overflow:auto;
}

.sidebar{
position:relative;
width:100%;
height:auto;
}

.main{
margin-left:0;
width:100%;
height:auto;
padding:15px;
}

.card{
padding:20px;
}

.card h1{
font-size:36px;
}

}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">

<img src="assets/logo.png">

<h2>
SHOWY
</h2>

</div>

<div class="menu">

<a
href="hr-dashboard.html"
class="menu-btn">

Dashboard

</a>

<a
href="hr-employees.html"
class="menu-btn">

Employees

</a>

<a
href="hr-attendance.html"
class="menu-btn">

Attendance

</a>

<a
href="hr-leaves.html"
class="menu-btn">

Leave Requests

</a>

<a
href="hr-salary.html"
class="menu-btn active">

Salary

</a>

<a
href="hr-reports.html"
class="menu-btn">

Reports

</a>

<a
href="index.html"
class="menu-btn logout-btn">

Logout

</a>

</div>

</div>

<!-- MAIN -->

<div class="main">

<div class="card">

<h1>
HR Salary Management
</h1>

<!-- STATS -->

<div class="stats">

<div class="statBox">

<h3>
Total Employees
</h3>

<h2 id="totalEmployees">
0
</h2>

</div>

<div class="statBox">

<h3>
Salary Paid
</h3>

<h2 id="salaryPaid">
0
</h2>

</div>

<div class="statBox">

<h3>
Pending Salary
</h3>

<h2 id="salaryPending">
0
</h2>

</div>

<div class="statBox">

<h3>
Total Salary
</h3>

<h2 id="totalSalary">
₹ 0
</h2>

</div>

</div>

<!-- SEARCH -->

<div class="searchBox">

<input
type="text"
id="search"
placeholder="Search Employee / Department"
onkeyup="renderTable()">

</div>

<!-- TABLE -->

<div class="tableWrapper">

<table>

<thead>

<tr>

<th>Employee</th>
<th>Department</th>
<th>Monthly Salary</th>
<th>Present Days</th>
<th>Absent Days</th>
<th>Bonus</th>
<th>Deduction</th>
<th>Final Salary</th>
<th>Status</th>
<th>Actions</th>

</tr>

</thead>

<tbody id="salaryTable">

<tr>

<td colspan="10"
style="text-align:center;padding:30px;">

Loading Salary Data...

</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>

<script>

/* ======================================
   AUTH
====================================== */

const employee =
JSON.parse(
localStorage.getItem("employee")
);

if(!employee){

window.location.href =
"index.html";

}

const role =
(employee.role || "")
.trim()
.toLowerCase();

if(role !== "hr"){

alert("Access Denied");

window.location.href =
"index.html";

}

/* ======================================
   URLS
====================================== */

const SHEET_ID =
"1WgtFzzQTJ4-lRyrS0SURRH8fmMGqjK7Yt2ACDYmn0ZU";

const EMPLOYEE_URL =
`https://opensheet.elk.sh/${SHEET_ID}/Employee_Data`;

const ATTENDANCE_URL =
`https://opensheet.elk.sh/${SHEET_ID}/Attendance`;

const SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbyFx70qjoYYPeer9JMMvcXKiswUXe0HUJDaRSEGZeUVLjdOCKOQ2icoKCaPlWPEVImwXg/exec";

/* ======================================
   GLOBAL
====================================== */

let employeeData = [];
let attendanceData = [];

/* ======================================
   LOAD DATA
====================================== */

async function loadData(){

try{

const empRes =
await fetch(EMPLOYEE_URL);

employeeData =
await empRes.json();

const attendanceRes =
await fetch(ATTENDANCE_URL);

attendanceData =
await attendanceRes.json();

updateStats();

renderTable();

}
catch(error){

console.log(error);

alert(
"Failed To Load Salary Data"
);

}

}

/* ======================================
   UPDATE STATS
====================================== */

function updateStats(){

document.getElementById(
"totalEmployees"
).innerText =
employeeData.length;

let totalSalary = 0;

employeeData.forEach(emp=>{

totalSalary +=
Number(emp.MonthlySalary || 0);

});

document.getElementById(
"totalSalary"
).innerText =
`₹ ${totalSalary}`;

document.getElementById(
"salaryPaid"
).innerText =
0;

document.getElementById(
"salaryPending"
).innerText =
employeeData.length;

}

/* ======================================
   RENDER TABLE
====================================== */

function renderTable(){

const table =
document.getElementById(
"salaryTable"
);

const search =
document.getElementById(
"search"
).value.toLowerCase();

const filtered =
employeeData.filter(item =>

(item.Name || "")
.toLowerCase()
.includes(search)

||

(item.Department || "")
.toLowerCase()
.includes(search)

);

if(filtered.length === 0){

table.innerHTML = `

<tr>

<td colspan="10"
style="text-align:center;padding:30px;">

No Employees Found

</td>

</tr>

`;

return;

}

table.innerHTML = "";

filtered.forEach((emp,index)=>{

const monthlySalary =
Number(emp.MonthlySalary || 0);

const presentDays =
attendanceData.filter(item =>

item.Employee === emp.Name

&&

(item.Status || "")
.toLowerCase() === "present"

).length;

const absentDays =
30 - presentDays;

const finalSalary =
monthlySalary;

table.innerHTML += `

<tr>

<td>
${emp.Name || "-"}
</td>

<td>
${emp.Department || "-"}
</td>

<td>
₹ ${monthlySalary}
</td>

<td>
${presentDays}
</td>

<td>
${absentDays}
</td>

<td>

<input
type="number"
class="inputField"
id="bonus${index}"
placeholder="Bonus"
value="0">

</td>

<td>

<input
type="number"
class="inputField"
id="deduction${index}"
placeholder="Deduction"
value="0">

</td>

<td id="finalSalary${index}">
₹ ${finalSalary}
</td>

<td class="pending">
Pending
</td>

<td>

<div class="actionButtons">

<button
class="actionBtn saveBtn"
onclick="calculateSalary(
${monthlySalary},
${index}
)">

Calculate

</button>

<button
class="actionBtn paidBtn"
onclick="markPaid(
'${emp.Name}'
)">

Paid

</button>

</div>

</td>

</tr>

`;

});

}

/* ======================================
   CALCULATE SALARY
====================================== */

function calculateSalary(
salary,
index
){

const bonus =
Number(
document.getElementById(
`bonus${index}`
).value || 0
);

const deduction =
Number(
document.getElementById(
`deduction${index}`
).value || 0
);

const finalSalary =
salary + bonus - deduction;

document.getElementById(
`finalSalary${index}`
).innerText =
`₹ ${finalSalary}`;

}

/* ======================================
   MARK PAID
====================================== */

function markPaid(name){

alert(
`${name} Salary Marked As Paid`
);

}

/* ======================================
   START
====================================== */

loadData();

</script>

</body>

</html>
