/* =========================================
PAGE ONLY CSS
========================================= */

.card{
background:white;
color:black;
padding:35px;
border-radius:25px;
max-width:1200px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.card h1{
margin-bottom:30px;
font-size:48px;
}

.inputBox{
margin-bottom:22px;
}

.inputBox label{
display:block;
margin-bottom:10px;
font-weight:bold;
font-size:17px;
}

.inputBox input,
.inputBox textarea,
.inputBox select{
width:100%;
padding:15px;
border:1px solid #ccc;
border-radius:14px;
font-size:15px;
outline:none;
transition:0.3s;
background:white;
}

.inputBox input:focus,
.inputBox textarea:focus,
.inputBox select:focus{
border-color:#f5a000;
box-shadow:0 0 5px rgba(245,160,0,0.4);
}

.taskCard{
border:1px solid #e5e5e5;
padding:22px;
border-radius:20px;
margin-bottom:25px;
background:#fafafa;
}

.taskCard h2{
margin-bottom:18px;
font-size:28px;
}

.taskTop{
display:grid;
grid-template-columns:2fr 1fr 1fr;
gap:15px;
margin-bottom:15px;
}

.taskCard textarea{
width:100%;
height:90px;
resize:none;
padding:14px;
border:1px solid #ccc;
border-radius:12px;
font-size:15px;
}

#extraNotes,
#tomorrowPlan{
height:120px;
resize:none;
}

.completed{
background:#d8ffe0 !important;
color:green;
font-weight:bold;
}

.pending{
background:#fff5cf !important;
color:#b88600;
font-weight:bold;
}

.start{
background:#ffd9d9 !important;
color:red;
font-weight:bold;
}

.submitBtn{
background:#f5a000;
border:none;
padding:18px;
font-size:18px;
font-weight:bold;
border-radius:14px;
cursor:pointer;
transition:0.3s;
width:100%;
margin-top:10px;
}

.submitBtn:hover{
opacity:0.9;
transform:translateY(-2px);
}

/* =========================================
MOBILE NAV
========================================= */

.mobileBottomNav{

display:flex;
justify-content:space-around;
align-items:center;

position:fixed;

bottom:12px;
left:12px;
right:12px;

height:82px;

background:rgba(7,27,70,0.97);

backdrop-filter:blur(18px);

border-radius:24px;

padding:8px;

z-index:5000;

box-shadow:
0 8px 20px rgba(0,0,0,0.25);

}

/* NAV ITEM */

.bottomNavItem{

flex:1;

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

text-decoration:none;

color:white;

font-size:11px;
font-weight:600;

gap:6px;

}

/* ICON BOX */

.bottomIcon{

width:52px;
height:52px;

background:#17357a;

border-radius:16px;

display:flex;
align-items:center;
justify-content:center;

transition:0.3s ease;

}

/* ICON IMAGE */

.bottomIcon img{

width:45px;
height:45px;

object-fit:contain;

}

/* ACTIVE BUTTON */

.bottomNavItem.active .bottomIcon{

background:#f5a000;

transform:translateY(-4px);

box-shadow:
0 6px 16px rgba(245,160,0,0.35);

}

/* IMPORTANT FIX */

.bottomNavItem.active{

background:transparent !important;

}

/* ACTIVE TEXT */

.bottomNavItem.active p{

color:#f5a000;

}

/* TEXT */

.bottomNavItem p{

margin:0;

font-size:11px;

}

/* =========================================
MOBILE
========================================= */

@media(max-width:768px){

.card{
padding:22px;
border-radius:22px;
}

.card h1{
font-size:34px;
}

.taskTop{
grid-template-columns:1fr;
}

.main{
padding-bottom:110px;

/* SIDEBAR FIX */

.sidebar{

position:fixed;

top:0;
left:-100%;

width:280px;
height:100vh;

background:#071b46;

padding:25px 18px;

overflow-y:auto;

transition:0.3s ease;

z-index:9999;

}

.sidebar.show{
left:0;
}

}

/* DESKTOP HIDE */

@media(min-width:769px){

.mobileBottomNav{
display:none;
}

}

<script>

/* SIDEBAR */

function openSidebar(){

document
.getElementById("sidebar")
.classList.toggle("show");

}

/* DROPDOWN */

function toggleDropdown(id){

document
.getElementById(id)
.classList.toggle("show");

}

/* SCRIPT URL */

const SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbyFx70qjoYYPeer9JMMvcXKiswUXe0HUJDaRSEGZeUVLjdOCKOQ2icoKCaPlWPEVImwXg/exec";

/* EMPLOYEE */

const employee =
JSON.parse(localStorage.getItem("employee"));

if(!employee){

window.location.href =
"index.html";

}

document.getElementById("name").value =
employee.name || employee.Name || "";

document.getElementById("date").value =
new Date().toISOString().split("T")[0];

/* PROJECTS */

let allProjects = [];

async function loadProjects(){

try{

const response =
await fetch(
"https://opensheet.elk.sh/1WgtFzzQTJ4-lRyrS0SURRH8fmMGqjK7Yt2ACDYmn0ZU/Projects"
);

allProjects =
await response.json();

createTaskBoxes();

}
catch(error){

console.log(error);

alert("Failed to load projects");

}

}

/* CREATE TASKS */

function createTaskBoxes(){

const container =
document.getElementById("tasksContainer");

container.innerHTML = "";

for(let i=1;i<=5;i++){

let options =
`<option value="">Select Project</option>`;

allProjects.forEach(project => {

options += `

<option value="${project.ProjectCode}">
${project.ProjectCode} - ${project.ProjectName}
</option>

`;

});

container.innerHTML += `

<div class="taskCard">

<h2>
Task ${i}
</h2>

<div class="taskTop">

<select id="project${i}">

${options}

</select>

<select
id="status${i}"
onchange="changeStatusColor(${i})">

<option value="Need to Start">
🔴 Need to Start
</option>

<option value="Completed">
🟢 Completed
</option>

<option value="In Process">
🟡 In Process
</option>

</select>

<input
type="number"
id="progress${i}"
placeholder="% Completed"
min="0"
max="100">

</div>

<textarea
id="task${i}"
placeholder="Enter Task ${i} Update"></textarea>

</div>

`;

}

for(let i=1;i<=5;i++){

changeStatusColor(i);

}

}

/* STATUS */

function changeStatusColor(i){

const select =
document.getElementById(`status${i}`);

if(!select) return;

select.classList.remove(
"completed",
"pending",
"start"
);

if(select.value === "Completed"){

select.classList.add("completed");

}
else if(select.value === "In Process"){

select.classList.add("pending");

}
else{

select.classList.add("start");

}

}

/* SUBMIT */

async function submitTask(){

const data = {

type:"task",

name:
document.getElementById("name").value,

date:
document.getElementById("date").value,

extraNotes:
document.getElementById("extraNotes").value,

tomorrowPlan:
document.getElementById("tomorrowPlan").value

};

for(let i=1;i<=5;i++){

data[`project${i}`] =
document.getElementById(`project${i}`).value;

data[`task${i}`] =
document.getElementById(`task${i}`).value;

data[`status${i}`] =
document.getElementById(`status${i}`).value;

data[`progress${i}`] =
document.getElementById(`progress${i}`).value;

}

try{

await fetch(SCRIPT_URL,{

method:"POST",

body:JSON.stringify(data)

});

alert("Task Submitted Successfully");

for(let i=1;i<=5;i++){

document.getElementById(`task${i}`).value = "";

document.getElementById(`progress${i}`).value = "";

}

document.getElementById("extraNotes").value = "";

document.getElementById("tomorrowPlan").value = "";

}
catch(error){

console.log(error);

alert("Submission Failed");

}

}

/* START */

loadProjects();

</script>
