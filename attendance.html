<!DOCTYPE html>
<html lang="en">

<head>

<title>Showy Attendance</title>

content="width=device-width, initial-scale=1.0">

href="assets/logo.png">

<link rel="stylesheet"
href="css/style.css">

<style>

/* =========================================
RESET
========================================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#041638;
overflow-x:hidden;
color:white;
}

/* =========================================
MOBILE HEADER
========================================= */

.mobileTop{
display:none;
}

/* =========================================
SIDEBAR
========================================= */

.sidebar{
position:fixed;
left:0;
top:0;
width:250px;
height:100vh;
background:#071b46;
padding:20px;
overflow-y:auto;
z-index:2000;
transition:0.3s;
}

.logo{
text-align:center;
margin-bottom:30px;
}

.logo img{
width:90px;
}

.logo h2{
margin-top:10px;
font-size:34px;
}

/* =========================================
MENU
========================================= */

.menu-btn,
.dropdown-btn{
display:block;
width:100%;
padding:16px;
margin-bottom:12px;

border:none;
border-radius:16px;

background:#12307a;
color:white;

text-decoration:none;
font-size:16px;
font-weight:bold;

cursor:pointer;
transition:0.3s;

text-align:left;
}

.menu-btn:hover,
.dropdown-btn:hover{
background:#f5a000;
color:black;
}

.active{
background:#f5a000 !important;
color:black !important;
}

/* =========================================
DROPDOWN
========================================= */

.dropdown-btn{
color:#ffb400;
}

.dropdown-content{
display:none;
padding-left:8px;
margin-bottom:10px;
}

.dropdown-content.show{
display:block;
}

/* =========================================
LOGOUT
========================================= */

.logout-btn{
display:block;
width:100%;
padding:16px;

margin-top:20px;

border-radius:16px;

background:red;
color:white;

text-decoration:none;
font-size:16px;
font-weight:bold;

text-align:center;
}

/* =========================================
MAIN
========================================= */

.main{
margin-left:250px;
padding:25px;
}

/* =========================================
TOP
========================================= */

.top{
display:flex;
justify-content:space-between;
align-items:center;
gap:20px;
margin-bottom:30px;
flex-wrap:wrap;
}

.top h1{
font-size:52px;
line-height:1.2;
}

/* =========================================
NAV
========================================= */

.nav{
display:flex;
gap:12px;
flex-wrap:wrap;
}

.nav button{
padding:14px 24px;
border:none;
border-radius:14px;
cursor:pointer;
font-size:16px;
font-weight:bold;
background:white;
color:black;
transition:0.3s;
}

.nav button:hover{
background:#f5a000;
}

/* =========================================
SUMMARY
========================================= */

.summary{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:40px;
}

.box{
padding:30px;
border-radius:24px;
text-align:center;
}

.box h1{
font-size:60px;
margin-bottom:10px;
}

.presentBox{
background:linear-gradient(#22c55e,#16a34a);
}

.absentBox{
background:linear-gradient(#ef4444,#dc2626);
}

.holidayBox{
background:linear-gradient(#8b5cf6,#6d28d9);
}

.halfdayBox{
background:linear-gradient(#f97316,#ea580c);
}

/* =========================================
CALENDAR
========================================= */

.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:14px;
}

.weekday{
text-align:center;
opacity:0.7;
font-size:18px;
margin-bottom:5px;
background:#132b63;
padding:12px;
border-radius:16px;
font-weight:bold;
}

.day{
background:rgba(255,255,255,0.08);
border-radius:18px;
min-height:120px;
padding:12px;
}

.date{
font-size:20px;
font-weight:bold;
}

.task{
margin-top:35px;
font-size:15px;
font-weight:bold;
word-break:break-word;
}

/* =========================================
COLORS
========================================= */

.present{
background:linear-gradient(#22c55e,#16a34a);
}

.absent{
background:linear-gradient(#ef4444,#dc2626);
}

.holiday{
background:linear-gradient(#8b5cf6,#6d28d9);
}

.weekoff{
background:linear-gradient(#6366f1,#4f46e5);
}

.halfday{
background:linear-gradient(#f97316,#ea580c);
}

/* =========================================
MOBILE
========================================= */

@media(max-width:768px){

/* MOBILE HEADER */

.mobileTop{
display:flex;
justify-content:space-between;
align-items:center;

padding:15px 20px;

background:#071b46;

position:sticky;
top:0;

z-index:3000;
}

.mobileTop img{
width:70px;
height:auto;
}

.menuToggle{
font-size:30px;
cursor:pointer;
}

/* SIDEBAR */

.sidebar{
left:-100%;
width:280px;
}

.sidebar.show{
left:0;
}

/* MAIN */

.main{
margin-left:0;
padding:15px;
padding-bottom:100px;
}

/* TOP */

.top{
flex-direction:column;
align-items:flex-start;
}

.top h1{
font-size:34px;
}

/* NAV */

.nav{
width:100%;
}

.nav button{
flex:1;
padding:15px;
font-size:16px;
}

/* SUMMARY */

.summary{
grid-template-columns:1fr;
gap:15px;
}

.box{
padding:22px;
}

.box h1{
font-size:42px;
}

/* CALENDAR */

.calendar{
overflow-x:auto;
grid-template-columns:repeat(7,80px);
padding-bottom:10px;
}

.weekday{
font-size:14px;
min-width:80px;
}

.day{
min-width:80px;
min-height:90px;
padding:8px;
}

.date{
font-size:16px;
}

.task{
font-size:11px;
margin-top:20px;
}

/* =========================================
PREMIUM MOBILE NAV
========================================= */

.mobileBottomNav{

display:flex;
justify-content:space-around;
align-items:center;

position:fixed;
bottom:10px;
left:18px;
right:18px;

height:58px;

background:rgba(7,27,70,0.88);

backdrop-filter:blur(18px);

border-radius:24px;

border:1px solid rgba(255,255,255,0.06);

box-shadow:
0 8px 25px rgba(0,0,0,0.25);

z-index:5000;

padding:6px;

left:12px;
right:12px;
bottom:12px;

width:auto;

}

/* NAV ITEM */

.bottomNavItem{

flex:1;

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

text-decoration:none;

gap:4px;

padding:0;

background:transparent;

transition:0.3s ease;

}

/* ICON */

.bottomIcon{

width:38px;
height:38px;

border-radius:14px;

background:#12307a;

display:flex;
align-items:center;
justify-content:center;

transition:all 0.3s ease;

box-shadow:
0 4px 10px rgba(0,0,0,0.15);

}

/* ICON IMAGE */

.bottomIcon img{

width:45px;
height:45px;

object-fit:contain;

}

/* TEXT */

.bottomNavItem p{

font-size:9px;
font-weight:600;

color:white;

margin-top:2px;

}

/* ACTIVE ICON */

.bottomNavItem.active .bottomIcon{

background:#f5a000;

width:34px;
height:34px;

border-radius:12px;

box-shadow:
0 4px 10px rgba(245,160,0,0.22);

}

/* REMOVE BIG YELLOW BOX */

.bottomNavItem.active{

background:transparent !important;

}

}

/* =========================================
DESKTOP HIDE
========================================= */

@media(min-width:769px){

.mobileBottomNav{
display:none;
}

}

</style>

<script>

/* ======================================
SIDEBAR
====================================== */

function openSidebar(){

document
.getElementById("sidebar")
.classList.toggle("show");

}

/* ======================================
DROPDOWN
====================================== */

function toggleDropdown(id){

document
.getElementById(id)
.classList.toggle("show");

}

/* ======================================
AUTO OPEN HR
====================================== */

document
.getElementById("hrMenu")
.classList.add("show");

/* ======================================
EMPLOYEE
====================================== */

const employee =

JSON.parse(
localStorage.getItem("employee")
);

if(!employee){

window.location.href =
"index.html";

}

/* ======================================
MONTH
====================================== */

let year = 2026;
let month = 4;

/* ======================================
ATTENDANCE
====================================== */

let attendance = [];

/* ======================================
LOAD ATTENDANCE
====================================== */

function loadAttendance(){

const months=[

"January",
"February",
"March",
"April",
"May",
"June",
"July",
"August",
"September",
"October",
"November",
"December"

];

const sheetName =

`${months[month]}_${year}`;

const SHEET_URL =

`https://opensheet.elk.sh/1WgtFzzQTJ4-lRyrS0SURRH8fmMGqjK7Yt2ACDYmn0ZU/${sheetName}`;

fetch(SHEET_URL)

.then(res => res.json())

.then(data => {

const emp =

data.find(
row =>
row.Email &&
row.Email.trim().toLowerCase() ===
employee.email.trim().toLowerCase()
);

if(!emp){

attendance = [];

generateCalendar();

return;

}

attendance = [];

for(let i=1; i<=31; i++){

let key =

Object.keys(emp).find(
k =>
k.includes(`${months[month]} ${i}`)
);

let status = key ? emp[key] : "";

attendance.push({

day:i,
status:status

});

}

generateCalendar();

})

.catch(error => {

console.log(error);

alert("Sheet connection error");

});

}

/* ======================================
START
====================================== */

loadAttendance();

/* ======================================
GENERATE CALENDAR
====================================== */

function generateCalendar(){

const cal =

document.getElementById(
"calendar"
);

cal.innerHTML = "";

const months = [

"January",
"February",
"March",
"April",
"May",
"June",
"July",
"August",
"September",
"October",
"November",
"December"

];

document.getElementById(
"title"
).innerHTML =

`${months[month]} ${year} Attendance`;

const days = [

"Sun",
"Mon",
"Tue",
"Wed",
"Thu",
"Fri",
"Sat"

];

days.forEach(d => {

cal.innerHTML +=

`<div class="weekday">${d}</div>`;

});

const firstDay =

new Date(
year,
month,
1
).getDay();

const total =

new Date(
year,
month + 1,
0
).getDate();

for(let i=0; i<firstDay; i++){

cal.innerHTML += `<div></div>`;

}

let present = 0;
let absent = 0;
let holiday = 0;
let halfday = 0;

for(let d=1; d<=total; d++){

let rec =

attendance.find(
x => x.day === d
);

let cls = "day";
let text = "";

if(rec){

if(rec.status === "P"){

cls += " present";

text = "Present";

present++;

}

if(rec.status === "A"){

cls += " absent";

text = "Absent";

absent++;

}

if(rec.status === "H"){

cls += " holiday";

text = "Holiday";

holiday++;

}

if(rec.status === "WO"){

cls += " weekoff";

text = "Week Off";

}

if(rec.status === "P-1/2"){

cls += " halfday";

text = "Half Day";

halfday++;

}

}

cal.innerHTML += `

<div class="${cls}">

<div class="date">
${d}
</div>

<div class="task">
${text}
</div>

</div>

`;

}

document.getElementById(
"presentCount"
).innerHTML = present;

document.getElementById(
"absentCount"
).innerHTML = absent;

document.getElementById(
"holidayCount"
).innerHTML = holiday;

document.getElementById(
"halfdayCount"
).innerHTML = halfday;

}

/* ======================================
MONTH CHANGE
====================================== */

function changeMonth(dir){

month += dir;

if(month > 11){

month = 0;

year++;

}

if(month < 0){

month = 11;

year--;

}

loadAttendance();

}

</script>
