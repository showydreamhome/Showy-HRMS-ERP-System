<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Material Request</title>

<link rel="icon"
href="assets/logo.png">

<style>

/* =========================================
RESET
========================================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#041638;
overflow-x:hidden;
color:white;
}

/* =========================================
MOBILE HEADER
========================================= */

.mobileTop{
display:none;
}

/* =========================================
SIDEBAR
========================================= */

.sidebar{
position:fixed;
left:0;
top:0;
width:250px;
height:100vh;
background:#071b46;
padding:20px;
overflow-y:auto;
z-index:2000;
transition:0.3s;
}

.logo{
text-align:center;
margin-bottom:30px;
}

.logo img{
width:90px;
}

.logo h2{
margin-top:10px;
font-size:34px;
color:white;
}

/* =========================================
MENU
========================================= */

.menu-btn,
.dropdown-btn{

display:block;
width:100%;

padding:16px;
margin-bottom:12px;

border:none;
border-radius:16px;

background:#12307a;
color:white;

text-decoration:none;

font-size:16px;
font-weight:bold;

cursor:pointer;

transition:0.3s;

text-align:left;

}

.menu-btn:hover,
.dropdown-btn:hover{

background:#f5a000;
color:black;

}

.active{
background:#f5a000 !important;
color:black !important;
}

/* =========================================
DROPDOWN
========================================= */

.dropdown-btn{
color:#ffb400;
}

.dropdown-content{
display:none;
padding-left:8px;
margin-bottom:10px;
}

.dropdown-content.show{
display:block;
}

/* FIXED DROPDOWN LINKS */

.dropdown-content a{

display:block;

width:100%;

padding:14px 16px;

margin-bottom:10px;

border-radius:14px;

background:#12307a;

color:white !important;

text-decoration:none !important;

font-size:15px;

font-weight:bold;

transition:0.3s;

}

.dropdown-content a:hover{

background:#f5a000;

color:black !important;

transform:translateX(3px);

}

.dropdown-content a.active{

background:#f5a000 !important;

color:black !important;

}

.dropdown-content a:visited{

color:white !important;

}

/* =========================================
LOGOUT
========================================= */

.logout-btn{

display:block;
width:100%;

padding:16px;

margin-top:20px;

border-radius:16px;

background:red;
color:white;

text-decoration:none;

font-size:16px;
font-weight:bold;

text-align:center;

transition:0.3s;

}

.logout-btn:hover{
background:#cc0000;
}

/* =========================================
MAIN
========================================= */

.main{
margin-left:250px;
padding:35px;
}

/* =========================================
CARD
========================================= */

.card{

background:white;
color:black;

padding:35px;

border-radius:28px;

box-shadow:
0 10px 25px rgba(0,0,0,0.18);

}

/* =========================================
TITLE
========================================= */

.card h1{

font-size:42px;
margin-bottom:28px;

color:#071b46;

}

/* =========================================
INPUT
========================================= */

.inputBox{
margin-bottom:22px;
}

.inputBox label{

display:block;

margin-bottom:10px;

font-weight:bold;

font-size:16px;

color:#071b46;

}

.inputBox input,
.inputBox select,
textarea{

width:100%;

padding:16px;

border:1px solid #ddd;

border-radius:14px;

font-size:15px;

outline:none;

transition:0.3s;

}

.inputBox input:focus,
.inputBox select:focus,
textarea:focus{

border-color:#f5a000;

box-shadow:
0 0 8px rgba(245,160,0,0.25);

}

textarea{
height:100px;
resize:none;
}

/* =========================================
GRID
========================================= */

.row{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

/* =========================================
STOCK
========================================= */

.stock{
background:#e8fff0;
color:green;
font-weight:bold;
}

/* =========================================
BUTTONS
========================================= */

.btn{

padding:15px 25px;

border:none;

border-radius:14px;

font-size:16px;
font-weight:bold;

cursor:pointer;

transition:0.3s;

}

.btn:hover{
opacity:0.9;
transform:translateY(-2px);
}

.addBtn{
background:#071b46;
color:white;
}

.submitBtn{
background:#f5a000;
color:black;
margin-top:20px;
width:100%;
}

/* =========================================
TABLE
========================================= */

.tableContainer{
overflow-x:auto;
margin-top:30px;
}

table{
width:100%;
border-collapse:collapse;
min-width:800px;
}

table th{

background:#071b46;
color:white;

padding:16px;

text-align:left;

font-size:15px;

}

table td{

padding:16px;

border-bottom:1px solid #eee;

font-size:15px;

}

table tr:hover{
background:#f8f8f8;
}

.removeBtn{

background:red;
color:white;

border:none;

padding:10px 14px;

border-radius:10px;

cursor:pointer;

font-weight:bold;

}

.empty{
text-align:center;
padding:25px;
font-weight:bold;
}

/* =========================================
MOBILE
========================================= */

@media(max-width:768px){

/* MOBILE HEADER */

.mobileTop{

display:flex;
justify-content:space-between;
align-items:center;

padding:15px 20px;

background:#071b46;

position:sticky;
top:0;

z-index:3000;

}

.mobileTop img{
width:45px;
height:auto;
}

.menuToggle{
font-size:30px;
cursor:pointer;
}

/* SIDEBAR */

.sidebar{
left:-100%;
width:280px;
}

.sidebar.show{
left:0;
}

/* MAIN */

.main{
margin-left:0;
padding:15px;
padding-bottom:95px;
}

/* CARD */

.card{
padding:22px;
border-radius:24px;
}

.card h1{
font-size:30px;
}

/* ROW */

.row{
grid-template-columns:1fr;
}

/* =========================================
PREMIUM MOBILE NAV
========================================= */

.mobileBottomNav{

display:flex;
justify-content:space-around;
align-items:center;

position:fixed;
bottom:12px;
left:12px;
right:12px;

height:58px;

background:rgba(7,27,70,0.88);

backdrop-filter:blur(18px);

border-radius:24px;

border:1px solid rgba(255,255,255,0.06);

box-shadow:
0 8px 25px rgba(0,0,0,0.25);

z-index:5000;

padding:6px;

}

/* ITEM */

.bottomNavItem{

flex:1;

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

text-decoration:none;

gap:4px;

background:transparent;

transition:0.3s ease;

}

/* ICON */

.bottomIcon{

width:38px;
height:38px;

border-radius:14px;

background:#12307a;

display:flex;
align-items:center;
justify-content:center;

transition:all 0.3s ease;

}

/* IMAGE */

.bottomIcon img{

width:45px;
height:45px;

object-fit:contain;

}

/* TEXT */

.bottomNavItem p{

font-size:9px;
font-weight:600;

color:white;

margin-top:2px;

}

/* ACTIVE */

.bottomNavItem.active .bottomIcon{

background:#f5a000;

width:34px;
height:34px;

border-radius:12px;

box-shadow:
0 4px 10px rgba(245,160,0,0.22);

}

.bottomNavItem.active{
background:transparent !important;
}

}

/* =========================================
DESKTOP HIDE
========================================= */

@media(min-width:769px){

.mobileBottomNav{
display:none;
}

}

</style>

</head>

<script>

/* ======================================
SIDEBAR
====================================== */

function openSidebar(){

document
.getElementById("sidebar")
.classList.toggle("show");

}

/* ======================================
DROPDOWN
====================================== */

function toggleDropdown(id){

document
.getElementById(id)
.classList.toggle("show");

}

/* ======================================
SCRIPT URL
====================================== */

const SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbyFx70qjoYYPeer9JMMvcXKiswUXe0HUJDaRSEGZeUVLjdOCKOQ2icoKCaPlWPEVImwXg/exec";

/* ======================================
EMPLOYEE
====================================== */

const employee =
JSON.parse(localStorage.getItem("employee"));

if(!employee){

window.location.href =
"index.html";

}

/* ======================================
SET DATA
====================================== */

document.getElementById("employeeName").value =
employee.name || employee.Name || "";

document.getElementById("date").value =
new Date().toISOString().split("T")[0];

/* ======================================
GLOBAL
====================================== */

let inventoryData = [];
let projectData = [];
let cart = [];

/* ======================================
LOAD DATA
====================================== */

async function loadData(){

try{

/* INVENTORY */

const inventoryURL =
"https://opensheet.elk.sh/1WgtFzzQTJ4-lRyrS0SURRH8fmMGqjK7Yt2ACDYmn0ZU/Inventory";

const inventoryRes =
await fetch(inventoryURL);

inventoryData =
await inventoryRes.json();

/* PROJECTS */

const projectURL =
"https://opensheet.elk.sh/1WgtFzzQTJ4-lRyrS0SURRH8fmMGqjK7Yt2ACDYmn0ZU/Projects";

const projectRes =
await fetch(projectURL);

projectData =
await projectRes.json();

/* PROJECT DROPDOWN */

const projectSelect =
document.getElementById("project");

projectData.forEach(project=>{

projectSelect.innerHTML += `

<option value="${project.ProjectCode}">
${project.ProjectCode} - ${project.ProjectName}
</option>

`;

});

/* MATERIAL LIST */

const materialsList =
document.getElementById("materialsList");

inventoryData.forEach(item=>{

materialsList.innerHTML += `

<option value="${item["Material Name"]}"></option>

<option value="${item["Material Code"]}"></option>

`;

});

}
catch(error){

console.log(error);

alert("Failed to load data");

}

}

loadData();

/* ======================================
FILL MATERIAL
====================================== */

function fillMaterialDetails(){

const search =
document.getElementById("materialSearch")
.value
.toLowerCase();

const selected =
inventoryData.find(item =>

(item["Material Name"] || "")
.toLowerCase() === search ||

(item["Material Code"] || "")
.toLowerCase() === search

);

if(selected){

document.getElementById("materialSearch").value =
selected["Material Name"];

document.getElementById("materialCode").value =
selected["Material Code"];

document.getElementById("stock").value =
selected["Available Stock"];

}
else{

document.getElementById("materialCode").value = "";

document.getElementById("stock").value = "";

}

}

/* ======================================
ADD TO CART
====================================== */

function addToCart(){

const project =
document.getElementById("project").value;

const material =
document.getElementById("materialSearch").value;

const code =
document.getElementById("materialCode").value;

const stock =
document.getElementById("stock").value;

const qty =
document.getElementById("qty").value;

const notes =
document.getElementById("notes").value;

if(!project || !material || !qty){

alert("Please fill all fields");

return;

}

cart.push({

project,
material,
code,
stock,
qty,
notes

});

renderCart();

/* CLEAR */

document.getElementById("materialSearch").value = "";
document.getElementById("materialCode").value = "";
document.getElementById("stock").value = "";
document.getElementById("qty").value = "";
document.getElementById("notes").value = "";

}

/* ======================================
RENDER CART
====================================== */

function renderCart(){

const table =
document.getElementById("cartTable");

if(cart.length === 0){

table.innerHTML = `

<tr>

<td colspan="6"
class="empty">

No Materials Added

</td>

</tr>

`;

return;

}

table.innerHTML = "";

cart.forEach((item,index)=>{

table.innerHTML += `

<tr>

<td>${item.project}</td>

<td>${item.material}</td>

<td>${item.code}</td>

<td>${item.qty}</td>

<td>${item.stock}</td>

<td>

<button
class="removeBtn"
onclick="removeItem(${index})">

Remove

</button>

</td>

</tr>

`;

});

}

/* ======================================
REMOVE
====================================== */

function removeItem(index){

cart.splice(index,1);

renderCart();

}

/* ======================================
SUBMIT
====================================== */

async function submitRequest(){

if(cart.length === 0){

alert("Please add materials");

return;

}

const requestID =
"REQ" + Date.now();

try{

for(let item of cart){

const data = {

type:"materialRequest",

requestID:requestID,

date:
document.getElementById("date").value,

employee:
document.getElementById("employeeName").value,

project:item.project,

materialCode:item.code,

materialName:item.material,

quantity:item.qty,

notes:item.notes

};

await fetch(SCRIPT_URL,{

method:"POST",

body:JSON.stringify(data)

});

}

alert("Material Request Submitted");

cart = [];

renderCart();

}
catch(error){

console.log(error);

alert("Submission Failed");

}

}

</script>
