<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
HR Dashboard
</title>

<link
rel="icon"
href="assets/logo.png">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#041638;
display:flex;
color:white;
}

/* SIDEBAR */

.sidebar{
width:240px;
height:100vh;
background:#071b46;
padding:20px 15px;
position:fixed;
left:0;
top:0;
overflow-y:auto;
}

.logo{
text-align:center;
margin-bottom:30px;
}

.logo img{
width:80px;
margin-bottom:10px;
}

.logo h2{
font-size:32px;
}

/* MENU */

.menu{
display:flex;
flex-direction:column;
gap:12px;
}

.menu-btn{
display:block;
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#17357a;
color:white;
font-size:15px;
font-weight:bold;
text-decoration:none;
transition:0.3s;
}

.menu-btn:hover{
background:#f5a000;
color:black;
transform:translateX(3px);
}

.active{
background:#f5a000 !important;
color:black !important;
}

.logout-btn{
background:red !important;
}

.logout-btn:hover{
background:#cc0000 !important;
color:white !important;
}

/* MAIN */

.main{
margin-left:240px;
padding:30px;
width:100%;
}

/* TOP */

.topBar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
flex-wrap:wrap;
gap:20px;
}

.topBar h1{
font-size:48px;
}

/* CARDS */

.cards{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:white;
color:black;
padding:25px;
border-radius:22px;
}

.card h2{
font-size:18px;
color:#666;
margin-bottom:15px;
}

.card p{
font-size:42px;
font-weight:bold;
color:#071b46;
}

/* SECTION */

.section{
background:white;
color:black;
padding:25px;
border-radius:22px;
margin-bottom:25px;
overflow-x:auto;
}

.section h2{
margin-bottom:20px;
font-size:28px;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
}

table th{
background:#071b46;
color:white;
padding:14px;
text-align:left;
}

table td{
padding:14px;
border-bottom:1px solid #ddd;
}

/* MOBILE */

@media(max-width:900px){

body{
display:block;
}

.sidebar{
position:relative;
width:100%;
height:auto;
}

.main{
margin-left:0;
padding:20px;
}

.topBar h1{
font-size:34px;
}

}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">

<img src="assets/logo.png">

<h2>
SHOWY
</h2>

</div>

<div class="menu">

<a
href="hr-dashboard.html"
class="menu-btn active">

Dashboard

</a>

<a
href="hr-employees.html"
class="menu-btn">

Employees

</a>

<a
href="hr-attendance.html"
class="menu-btn">

Attendance

</a>

<a
href="hr-leaves.html"
class="menu-btn">

Leave Requests

</a>

<a
href="hr-salary.html"
class="menu-btn">

Salary

</a>

<a
href="hr-reports.html"
class="menu-btn">

Reports

</a>

<a
href="#"
class="menu-btn logout-btn"
onclick="logout()">

Logout

</a>

</div>

</div>

<!-- MAIN -->

<div class="main">

<div class="topBar">

<h1>
HR Dashboard
</h1>

</div>

<!-- CARDS -->

<div class="cards">

<div class="card">

<h2>Total Employees</h2>

<p id="totalEmployees">
0
</p>

</div>

<div class="card">

<h2>Present Today</h2>

<p id="presentToday">
0
</p>

</div>

<div class="card">

<h2>Pending Leaves</h2>

<p id="pendingLeaves">
0
</p>

</div>

<div class="card">

<h2>Departments</h2>

<p id="departments">
0
</p>

</div>

</div>

<!-- RECENT EMPLOYEES -->

<div class="section">

<h2>
Recent Employees
</h2>

<table>

<thead>

<tr>

<th>Name</th>
<th>Department</th>
<th>Role</th>

</tr>

</thead>

<tbody id="employeeTable">

<tr>

<td colspan="3">
Loading...
</td>

</tr>

</tbody>

</table>

</div>

</div>

<script>

/* ======================================
   AUTH
====================================== */

const employee =
JSON.parse(
localStorage.getItem("employee")
);

if(!employee){

window.location.href =
"index.html";

}

const role =
(employee.role || "")
.toLowerCase();

if(role !== "hr"){

alert("Access Denied");

window.location.href =
"index.html";

}

/* ======================================
   SHEET URL
====================================== */

const SHEET_URL =
"https://opensheet.elk.sh/1WgtFzzQTJ4-lRyrS0SURRH8fmMGqjK7Yt2ACDYmn0ZU";

/* ======================================
   LOAD DASHBOARD
====================================== */

async function loadDashboard(){

/* EMPLOYEES */

const empRes =
await fetch(
`${SHEET_URL}/Employee_Data`
);

const employees =
await empRes.json();

/* TOTAL EMPLOYEES */

document.getElementById(
"totalEmployees"
).innerHTML =
employees.length;

/* DEPARTMENTS */

const departments =
[
...new Set(
employees.map(
e => e.Department
)
)
];

document.getElementById(
"departments"
).innerHTML =
departments.length;

/* RECENT EMPLOYEES */

const table =
document.getElementById(
"employeeTable"
);

table.innerHTML = "";

employees
.reverse()
.slice(0,5)
.forEach(emp=>{

table.innerHTML += `

<tr>

<td>
${emp.Name || "-"}
</td>

<td>
${emp.Department || "-"}
</td>

<td>
${emp.Role || "-"}
</td>

</tr>

`;

});

/* ATTENDANCE */

try{

const attRes =
await fetch(
`${SHEET_URL}/Attendance`
);

const attendance =
await attRes.json();

const present =
attendance.filter(
a => a.Status === "Present"
).length;

document.getElementById(
"presentToday"
).innerHTML =
present;

}
catch(error){

console.log(error);

}

/* LEAVES */

try{

const leaveRes =
await fetch(
`${SHEET_URL}/Leave_Request`
);

const leaves =
await leaveRes.json();

const pending =
leaves.filter(
l => l.Status === "Pending"
).length;

document.getElementById(
"pendingLeaves"
).innerHTML =
pending;

}
catch(error){

console.log(error);

}

}

/* ======================================
   LOGOUT
====================================== */

function logout(){

localStorage.clear();

window.location.href =
"index.html";

}

/* ======================================
   START
====================================== */

loadDashboard();

</script>

</body>

</html>
