<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
HR Leave Requests
</title>

<link
rel="icon"
href="assets/logo.png">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#041638;
display:flex;
color:white;
overflow:hidden;
}

/* SIDEBAR */

.sidebar{
width:240px;
height:100vh;
background:#071b46;
padding:20px 15px;
position:fixed;
left:0;
top:0;
overflow-y:auto;
}

.logo{
text-align:center;
margin-bottom:30px;
}

.logo img{
width:80px;
margin-bottom:10px;
}

.logo h2{
font-size:32px;
}

/* MENU */

.menu{
display:flex;
flex-direction:column;
gap:12px;
}

.menu-btn{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#17357a;
color:white;
font-size:15px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
text-align:left;
text-decoration:none;
display:block;
}

.menu-btn:hover{
background:#f5a000;
color:black;
transform:translateX(3px);
}

.active{
background:#f5a000 !important;
color:black !important;
}

.logout-btn{
background:red !important;
color:white !important;
margin-top:10px;
}

.logout-btn:hover{
background:#cc0000 !important;
}

/* MAIN */

.main{
margin-left:240px;
padding:25px;
width:calc(100% - 240px);
height:100vh;
overflow-y:auto;
}

/* CARD */

.card{
background:white;
padding:30px;
border-radius:24px;
color:black;
}

.card h1{
font-size:54px;
margin-bottom:25px;
}

/* STATS */

.stats{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:30px;
}

.statBox{
background:#f5f5f5;
padding:25px;
border-radius:18px;
}

.statBox h3{
font-size:18px;
color:#666;
margin-bottom:10px;
}

.statBox h2{
font-size:42px;
color:#071b46;
}

/* SEARCH */

.searchBox{
margin-bottom:20px;
}

.searchBox input{
width:100%;
padding:16px;
border:1px solid #ccc;
border-radius:14px;
font-size:16px;
outline:none;
}

/* TABLE */

.tableWrapper{
overflow-x:auto;
border-radius:18px;
border:1px solid #ddd;
}

table{
width:100%;
border-collapse:collapse;
min-width:1400px;
}

table th{
background:#071b46;
color:white;
padding:18px;
font-size:15px;
text-align:left;
white-space:nowrap;
}

table td{
padding:18px;
border-bottom:1px solid #ddd;
font-size:15px;
vertical-align:middle;
white-space:nowrap;
}

/* STATUS */

.pending{
color:#ff9800;
font-weight:bold;
}

.approved{
color:green;
font-weight:bold;
}

.rejected{
color:red;
font-weight:bold;
}

/* INPUT */

.remarkInput{
padding:10px;
border:1px solid #ccc;
border-radius:10px;
width:180px;
outline:none;
}

/* BUTTONS */

.actionButtons{
display:flex;
gap:10px;
}

.actionBtn{
padding:10px 16px;
border:none;
border-radius:10px;
font-size:14px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.approveBtn{
background:green;
color:white;
}

.approveBtn:hover{
background:#006d00;
}

.rejectBtn{
background:red;
color:white;
}

.rejectBtn:hover{
background:#c40000;
}

/* MOBILE */

@media(max-width:1000px){

body{
display:block;
overflow:auto;
}

.sidebar{
position:relative;
width:100%;
height:auto;
}

.main{
margin-left:0;
width:100%;
height:auto;
padding:15px;
}

.card{
padding:20px;
}

.card h1{
font-size:36px;
}

}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">

<img src="assets/logo.png">

<h2>
SHOWY
</h2>

</div>

<div class="menu">

<a
href="hr-dashboard.html"
class="menu-btn">

Dashboard

</a>

<a
href="hr-employees.html"
class="menu-btn">

Employees

</a>

<a
href="hr-attendance.html"
class="menu-btn">

Attendance

</a>

<a
href="hr-leaves.html"
class="menu-btn active">

Leave Requests

</a>

<a
href="hr-salary.html"
class="menu-btn">

Salary

</a>

<a
href="hr-reports.html"
class="menu-btn">

Reports

</a>

<a
href="index.html"
class="menu-btn logout-btn">

Logout

</a>

</div>

</div>

<!-- MAIN -->

<div class="main">

<div class="card">

<h1>
HR Leave Requests
</h1>

<!-- STATS -->

<div class="stats">

<div class="statBox">

<h3>
Total Requests
</h3>

<h2 id="totalRequests">
0
</h2>

</div>

<div class="statBox">

<h3>
Pending
</h3>

<h2 id="pendingRequests">
0
</h2>

</div>

<div class="statBox">

<h3>
Approved
</h3>

<h2 id="approvedRequests">
0
</h2>

</div>

<div class="statBox">

<h3>
Rejected
</h3>

<h2 id="rejectedRequests">
0
</h2>

</div>

</div>

<!-- SEARCH -->

<div class="searchBox">

<input
type="text"
id="search"
placeholder="Search Employee / Leave Type"
onkeyup="renderTable()">

</div>

<!-- TABLE -->

<div class="tableWrapper">

<table>

<thead>

<tr>

<th>Employee</th>
<th>Department</th>
<th>Leave Type</th>
<th>From</th>
<th>To</th>
<th>Days</th>
<th>Reason</th>
<th>Status</th>
<th>HR Remark</th>
<th>Actions</th>

</tr>

</thead>

<tbody id="leaveTable">

<tr>

<td colspan="10"
style="text-align:center;padding:30px;">

Loading Leave Requests...

</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>

<script>

/* ======================================
   AUTH
====================================== */

const employee =
JSON.parse(
localStorage.getItem("employee")
);

if(!employee){

window.location.href =
"index.html";

}

const role =
(employee.role || "")
.trim()
.toLowerCase();

if(role !== "hr"){

alert("Access Denied");

window.location.href =
"index.html";

}

/* ======================================
   URLS
====================================== */

const SHEET_ID =
"1WgtFzzQTJ4-lRyrS0SURRH8fmMGqjK7Yt2ACDYmn0ZU";

const LEAVE_URL =
`https://opensheet.elk.sh/${SHEET_ID}/Leave_Request`;

const SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbyFx70qjoYYPeer9JMMvcXKiswUXe0HUJDaRSEGZeUVLjdOCKOQ2icoKCaPlWPEVImwXg/exec";

/* ======================================
   GLOBAL
====================================== */

let leaveData = [];

/* ======================================
   LOAD DATA
====================================== */

async function loadLeaves(){

try{

const response =
await fetch(LEAVE_URL);

leaveData =
await response.json();

updateStats();

renderTable();

}
catch(error){

console.log(error);

alert(
"Failed To Load Leave Requests"
);

}

}

/* ======================================
   STATS
====================================== */

function updateStats(){

document.getElementById(
"totalRequests"
).innerText =
leaveData.length;

document.getElementById(
"pendingRequests"
).innerText =
leaveData.filter(item=>

(item.Status || "")
.toLowerCase() === "pending"

).length;

document.getElementById(
"approvedRequests"
).innerText =
leaveData.filter(item=>

(item.Status || "")
.toLowerCase() === "approved"

).length;

document.getElementById(
"rejectedRequests"
).innerText =
leaveData.filter(item=>

(item.Status || "")
.toLowerCase() === "rejected"

).length;

}

/* ======================================
   RENDER TABLE
====================================== */

function renderTable(){

const table =
document.getElementById(
"leaveTable"
);

const search =
document.getElementById(
"search"
).value.toLowerCase();

const filtered =
leaveData.filter(item =>

(item.Employee || "")
.toLowerCase()
.includes(search)

||

(item["Leave Type"] || "")
.toLowerCase()
.includes(search)

);

if(filtered.length === 0){

table.innerHTML = `

<tr>

<td colspan="10"
style="text-align:center;padding:30px;">

No Leave Requests Found

</td>

</tr>

`;

return;

}

table.innerHTML = "";

filtered.reverse().forEach((item,index)=>{

let statusClass =
"pending";

if(item.Status === "Approved"){
statusClass = "approved";
}

if(item.Status === "Rejected"){
statusClass = "rejected";
}

table.innerHTML += `

<tr>

<td>
${item.Employee || "-"}
</td>

<td>
${item.Department || "-"}
</td>

<td>
${item["Leave Type"] || "-"}
</td>

<td>
${item["From Date"] || "-"}
</td>

<td>
${item["To Date"] || "-"}
</td>

<td>
${item.Days || "-"}
</td>

<td>
${item.Reason || "-"}
</td>

<td class="${statusClass}">
${item.Status || "Pending"}
</td>

<td>

<input
type="text"
class="remarkInput"
id="remark${index}"
placeholder="HR Remark">

</td>

<td>

<div class="actionButtons">

<button
class="actionBtn approveBtn"
onclick="updateLeave(
'${item.ID || ""}',
'Approved',
${index}
)">

Approve

</button>

<button
class="actionBtn rejectBtn"
onclick="updateLeave(
'${item.ID || ""}',
'Rejected',
${index}
)">

Reject

</button>

</div>

</td>

</tr>

`;

});

}

/* ======================================
   UPDATE LEAVE
====================================== */

async function updateLeave(
id,
status,
index
){

const remark =
document.getElementById(
`remark${index}`
).value;

const data = {

type:"updateLeave",

id:id,

status:status,

remark:remark

};

try{

await fetch(SCRIPT_URL,{

method:"POST",

body:JSON.stringify(data)

});

alert(
`Leave ${status}`
);

loadLeaves();

}
catch(error){

console.log(error);

alert(
"Failed To Update Leave"
);

}

}

/* ======================================
   START
====================================== */

loadLeaves();

</script>

</body>

</html>
