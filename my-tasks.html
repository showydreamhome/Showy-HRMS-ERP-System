<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>My Tasks</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#04143c;
display:flex;
height:100vh;
overflow:hidden;
color:white;
}

/* =========================
SIDEBAR
========================= */

.sidebar{

width:270px;
background:#021033;
padding:20px 15px;
overflow-y:auto;

}

/* LOGO */

.logo{

text-align:center;
margin-bottom:30px;

}

.logo img{

width:95px;
margin-bottom:10px;

}

.logo h2{

font-size:28px;
color:#f5a300;

}

/* MENU */

.menu{
display:flex;
flex-direction:column;
gap:12px;
}

/* BUTTONS */

.menu-btn,
.dropdown-btn{

width:100%;
padding:16px 18px;

background:#14357f;
border:none;

border-radius:14px;

color:white;
font-size:18px;
font-weight:bold;

text-align:left;
cursor:pointer;

transition:0.3s;
text-decoration:none;
display:block;

}

.menu-btn:hover,
.dropdown-btn:hover{

background:#f5a300;
color:black;

}

/* DROPDOWN */

.dropdown-content{

display:none;
flex-direction:column;
gap:10px;

padding-left:12px;

margin-top:-5px;
margin-bottom:10px;

}

.dropdown-content a{

background:#20479d;

padding:13px 15px;

border-radius:12px;

color:white;
text-decoration:none;

font-size:16px;
font-weight:bold;

transition:0.3s;

}

.dropdown-content a:hover{

background:#f5a300;
color:black;

}

/* ACTIVE */

.active-link{

background:#f5a300 !important;
color:black !important;

}

/* LOGOUT */

.logout-btn{

margin-top:20px;

background:red;
color:white;

padding:16px;
border-radius:14px;

text-decoration:none;
font-size:18px;
font-weight:bold;

text-align:center;

transition:0.3s;

}

.logout-btn:hover{
opacity:0.9;
}

/* =========================
MAIN
========================= */

.main{

flex:1;
padding:25px;
overflow-y:auto;

}

/* TOP */

.top-bar{

display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;

}

.top-bar h1{

font-size:55px;

}

.employee-box{

background:#f5a300;
padding:14px 24px;

border-radius:12px;

font-size:18px;
font-weight:bold;

color:black;

}

/* PROJECT */

.project-section{

margin-bottom:35px;

}

.project-title{

font-size:32px;
font-weight:bold;

margin-bottom:18px;

color:#f5a300;

}

/* TASK ROW */

.task-row{

background:white;
color:black;

padding:14px 16px;
border-radius:14px;

margin-bottom:12px;

display:grid;

grid-template-columns:
1.8fr
0.8fr
0.9fr
0.9fr
1.2fr
1.3fr;

gap:12px;

align-items:center;

min-height:110px;

}

/* TASK */

.task-title{

font-size:15px;
font-weight:bold;
margin-bottom:4px;

}

/* PRIORITY */

.high{
color:red;
font-weight:bold;
font-size:18px;
}

.medium{
color:orange;
font-weight:bold;
font-size:18px;
}

.low{
color:green;
font-weight:bold;
font-size:18px;
}

/* STATUS */

.status-badge{

padding:5px 9px;
border-radius:8px;
font-size:12px;
font-weight:bold;
display:inline-block;

}

.pending{
background:#ffe6a8;
color:black;
}

.progress{
background:#b7d7ff;
color:black;
}

.completed{
background:#a5efad;
color:black;
}

/* INPUTS */

select,
input{

width:100%;
padding:8px 10px;

border-radius:8px;
border:1px solid #ccc;

font-size:13px;

}

/* FILE */

.file-box{

font-size:13px;

}

/* BUTTON */

.update-btn{

background:#f5a300;
border:none;

padding:8px 10px;
border-radius:8px;

font-size:13px;
font-weight:bold;

cursor:pointer;

margin-top:6px;
width:100%;

}

.update-btn:hover{
opacity:0.9;
}

/* DONE */

.done{
background:#d4ffd9 !important;
border-left:6px solid #00a63e !important;
}

.pending-task{
border-left:6px solid #f5a000;
}

.progress-task{
border-left:6px solid #005eff;
}

.completed-task{
border-left:6px solid #00a63e;
}

/* PROOF */

.proof-link{

display:inline-block;
margin-top:8px;

font-size:14px;
font-weight:bold;

color:#0047ff;
text-decoration:none;

}

/* MOBILE */

@media(max-width:1100px){

body{
display:block;
overflow:auto;
}

.sidebar{
width:100%;
}

.main{
padding:15px;
}

.task-row{
grid-template-columns:1fr;
}

.top-bar{
flex-direction:column;
align-items:flex-start;
gap:15px;
}

.top-bar h1{
font-size:40px;
}

}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">

<img src="assets/logo.png">

<h2>SHOWY</h2>

</div>

<div class="menu">

<!-- DASHBOARD -->

<a href="dashboard.html"
class="menu-btn">

<!-- IN OUT -->

<a href="employee-movement.html"

HR ▼

<div
class="dropdown-content"

<a href="attendance.html">

</div>

<!-- SITE -->

<button

onclick="toggleDropdown('siteMenu')">

<div
class="dropdown-content"
id="siteMenu">

<a href="vehicle-site-keys.html">

Vehicle / Site Keys

</a>

</a>

</div>

<!-- INVENTORY -->

<button

onclick="toggleDropdown('inventoryMenu')">

<div

onclick="logout()">

Logout

</div>

<!-- MAIN -->

<div class="main">

<div class="top-bar">

<h1>My Tasks</h1>

<div
class="employee-box"
id="employeeBox">

Employee

</div>

</div>

<div id="tasksContainer">

Loading Tasks...

</div>

</div>

<script>

/* =========================
URL
========================= */

const SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbyFx70qjoYYPeer9JMMvcXKiswUXe0HUJDaRSEGZeUVLjdOCKOQ2icoKCaPlWPEVImwXg/exec";

/* =========================
IMGBB
========================= */

const IMGBB_API_KEY =
"474625ac45e96672f499790199a07997";

/* =========================
EMPLOYEE
========================= */

const employeeName =
localStorage.getItem("employeeName");

/* LOGIN CHECK */

if(!employeeName){

alert("Please Login First");

window.location.href =
"index.html";

}

/* SHOW NAME */

document.getElementById(
"employeeBox"
).innerText = employeeName;

/* =========================
DROPDOWN
========================= */

function toggleDropdown(id){

const menu =
document.getElementById(id);

if(menu.style.display === "flex"){

menu.style.display = "none";

}
else{

menu.style.display = "flex";

}

}

/* AUTO OPEN HR */

document.getElementById(
"hrMenu"
).style.display = "flex";

/* =========================
LOAD TASKS
========================= */

function loadTasks(){

const callbackName =
"taskCallback_" + Date.now();

window[callbackName] =
function(response){

const container =
document.getElementById(
"tasksContainer"
);

if(
!response.success ||
response.tasks.length == 0
){

container.innerHTML =
"<h2>No Tasks Found</h2>";

return;

}

/* GROUP */

let grouped = {};

response.tasks.forEach(task=>{

const project =
task.project || "General";

if(!grouped[project]){

grouped[project] = [];

}

grouped[project].push(task);

});

container.innerHTML = "";

/* LOOP */

for(let project in grouped){

container.innerHTML += `

<div class="project-section">

<div class="project-title">

${project}

</div>

<div id="project_${project}"></div>

</div>

`;

const section =
document.getElementById(
`project_${project}`
);

grouped[project].forEach(task=>{

let priorityClass = "low";

if(task.priority=="High"){
priorityClass="high";
}

if(task.priority=="Medium"){
priorityClass="medium";
}

let statusClass = "pending";

if(
task.status=="Started" ||
task.status=="In Progress"
){
statusClass="progress";
}

if(task.status=="Completed"){
statusClass="completed";
}

section.innerHTML += `

<div class="task-row
${task.status == "Completed" ? "completed-task done" : ""}
${task.status == "Pending" ? "pending-task" : ""}
${task.status == "Started" || task.status == "In Progress" ? "progress-task" : ""}">
<div>

<div class="task-title">

${task.taskTitle}

</div>

<div>

${task.description || ""}

</div>

</div>

<div>

<span class="${priorityClass}">
${task.priority}
</span>

</div>

<div>

${task.deadline.split("T")[0]}

</div>

<div>

<span class="status-badge ${statusClass}">

${task.status}

</span>

</div>

<div>

<input
type="text"
id="update_${task.taskID}"
placeholder="Work Update">

<br><br>

<input
type="file"
id="proof_${task.taskID}"
class="file-box">

${
task.completionProof
?

`<a
href="${task.completionProof}"
target="_blank"
class="proof-link">

View Proof

</a>`

:

""
}

</div>

<div>

<select id="status_${task.taskID}">

<option
${task.status=="Pending"?"selected":""}>
Pending
</option>

<option
${task.status=="Started"?"selected":""}>
Started
</option>

<option
${task.status=="In Progress"?"selected":""}>
In Progress
</option>

<option
${task.status=="Completed"?"selected":""}>
Completed
</option>

</select>

<button
class="update-btn"
onclick="updateTask('${task.taskID}')">

Update

</button>

</div>

</div>

`;

});

}

delete window[callbackName];

};

/* JSONP */

const script =
document.createElement("script");

script.src =

`${SCRIPT_URL}
?action=assignedTasks
&employee=${encodeURIComponent(employeeName)}
&callback=${callbackName}`;

document.body.appendChild(script);

}

/* =========================
UPDATE TASK
========================= */

async function updateTask(taskID){

const status =
document.getElementById(
`status_${taskID}`
).value;

const employeeUpdate =
document.getElementById(
`update_${taskID}`
).value;

const fileInput =
document.getElementById(
`proof_${taskID}`
);

let proofLink = "";

/* IMAGE */

if(fileInput.files.length > 0){

const file =
fileInput.files[0];

const formData =
new FormData();

formData.append(
"image",
file
);

try{

const uploadResponse =
await fetch(

`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`,

{
method:"POST",
body:formData
}

);

const uploadData =
await uploadResponse.json();

if(uploadData.success){

proofLink =
uploadData.data.url;

}
else{

alert("Image Upload Failed");
return;

}

}
catch(error){

alert("Image Upload Failed");
return;

}

}

/* DATA */

const data = {

type:"updateAssignedTask",

taskID:taskID,

employee:employeeName,

status:status,

employeeUpdate:employeeUpdate,

completionProof:proofLink

};

/* SAVE */

try{

await fetch(SCRIPT_URL,{

method:"POST",

mode:"no-cors",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify(data)

});

alert(
"Task Updated Successfully"
);

loadTasks();

}
catch(error){

alert(
"Update Failed"
);

}

}

/* =========================
LOGOUT
========================= */

function logout(){

localStorage.clear();

window.location.href =
"index.html";

}

/* =========================
START
========================= */

loadTasks();

</script>

</body>
