<head>

<meta charset="UTF-8">

content="width=device-width, initial-scale=1.0">

href="assets/logo.png">

<style>

/* =========================================
RESET
========================================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#04143c;
overflow-x:hidden;
color:white;
}

/* =========================================
MOBILE HEADER
========================================= */

.mobileTop{
display:none;
}

/* =========================================
SIDEBAR
========================================= */

.sidebar{

position:fixed;
left:0;
top:0;

width:260px;
height:100vh;

background:#021033;

padding:20px 15px;

overflow-y:auto;

z-index:2000;

transition:0.3s;

}

/* LOGO */

.logo{

text-align:center;
margin-bottom:30px;

}

.logo img{

width:90px;
margin-bottom:10px;

}

.logo h2{

font-size:30px;
color:#f5a300;

}

/* =========================================
MENU
========================================= */

.menu{
display:flex;
flex-direction:column;
gap:12px;
}

/* BUTTONS */

.menu-btn,
.dropdown-btn{

width:100%;

padding:16px 18px;

background:#14357f;

border:none;
border-radius:14px;

color:white;

font-size:16px;
font-weight:bold;

text-align:left;

cursor:pointer;

transition:0.3s;

text-decoration:none;

display:block;

}

.menu-btn:hover,
.dropdown-btn:hover{

background:#f5a300;
color:black;

}

/* ACTIVE */

.active-link{

background:#f5a300 !important;
color:black !important;

}

/* =========================================
DROPDOWN
========================================= */

.dropdown-content{

display:none;
flex-direction:column;

gap:10px;

padding-left:8px;

margin-top:-5px;
margin-bottom:10px;

}

.dropdown-content.show{
display:flex;
}

/* DROPDOWN LINKS */

.dropdown-content a{

display:block;

width:100%;

padding:14px 16px;

border-radius:14px;

background:#20479d;

color:white !important;

text-decoration:none !important;

font-size:15px;
font-weight:bold;

transition:0.3s;

}

.dropdown-content a:hover{

background:#f5a300;

color:black !important;

transform:translateX(3px);

}

.dropdown-content a.active-link{

background:#f5a300 !important;
color:black !important;

}

/* =========================================
LOGOUT
========================================= */

.logout-btn{

margin-top:20px;

background:red;
color:white;

padding:16px;

border-radius:14px;

text-decoration:none;

font-size:16px;
font-weight:bold;

text-align:center;

transition:0.3s;

display:block;

}

.logout-btn:hover{
opacity:0.9;
}

/* =========================================
MAIN
========================================= */

.main{

margin-left:260px;

padding:25px;

min-height:100vh;

overflow-y:auto;

}

/* TOP */

.top-bar{

display:flex;
justify-content:space-between;
align-items:center;

margin-bottom:30px;

flex-wrap:wrap;
gap:15px;

}

.top-bar h1{

font-size:52px;

}

.employee-box{

background:#f5a300;

padding:14px 24px;

border-radius:14px;

font-size:18px;
font-weight:bold;

color:black;

}

/* =========================================
PROJECT SECTION
========================================= */

.project-section{

margin-bottom:35px;

}

.project-title{

font-size:30px;
font-weight:bold;

margin-bottom:18px;

color:#f5a300;

}

/* =========================================
TASK CARD
========================================= */

.task-row{

background:white;
color:black;

padding:18px;

border-radius:18px;

margin-bottom:15px;

display:grid;

grid-template-columns:
1.8fr
0.8fr
0.9fr
0.9fr
1.2fr
1.3fr;

gap:14px;

align-items:center;

min-height:120px;

transition:0.3s;

}

.task-row:hover{

transform:translateY(-2px);

box-shadow:
0 6px 18px rgba(0,0,0,0.12);

}

/* =========================================
TASK TITLE
========================================= */

.task-title{

font-size:16px;
font-weight:bold;

margin-bottom:5px;

}

/* =========================================
PRIORITY
========================================= */

.high{
color:red;
font-weight:bold;
font-size:18px;
}

.medium{
color:orange;
font-weight:bold;
font-size:18px;
}

.low{
color:green;
font-weight:bold;
font-size:18px;
}

/* =========================================
STATUS BADGE
========================================= */

.status-badge{

padding:6px 10px;

border-radius:8px;

font-size:12px;
font-weight:bold;

display:inline-block;

}

.pending{
background:#ffe6a8;
color:black;
}

.progress{
background:#b7d7ff;
color:black;
}

.completed{
background:#a5efad;
color:black;
}

/* =========================================
INPUTS
========================================= */

select,
input{

width:100%;

padding:10px 12px;

border-radius:10px;

border:1px solid #ccc;

font-size:13px;

outline:none;

}

/* =========================================
FILE
========================================= */

.file-box{

font-size:13px;

}

/* =========================================
BUTTON
========================================= */

.update-btn{

background:#f5a300;

border:none;

padding:10px 12px;

border-radius:10px;

font-size:13px;
font-weight:bold;

cursor:pointer;

margin-top:8px;

width:100%;

transition:0.3s;

}

.update-btn:hover{
opacity:0.9;
}

/* =========================================
TASK COLORS
========================================= */

.done{
background:#d4ffd9 !important;
border-left:6px solid #00a63e !important;
}

.pending-task{
border-left:6px solid #f5a000;
}

.progress-task{
border-left:6px solid #005eff;
}

.completed-task{
border-left:6px solid #00a63e;
}

/* =========================================
PROOF LINK
========================================= */

.proof-link{

display:inline-block;

margin-top:8px;

font-size:14px;
font-weight:bold;

color:#0047ff;

text-decoration:none;

}

/* =========================================
MOBILE
========================================= */

@media(max-width:900px){

/* MOBILE HEADER */

.mobileTop{

display:flex;
justify-content:space-between;
align-items:center;

padding:15px 20px;

background:#021033;

position:sticky;
top:0;

z-index:3000;

}

.mobileTop img{
width:45px;
height:auto;
}

.menuToggle{
font-size:30px;
cursor:pointer;
}

/* SIDEBAR */

.sidebar{
left:-100%;
width:280px;
}

.sidebar.show{
left:0;
}

/* MAIN */

.main{
margin-left:0;
padding:15px;
padding-bottom:95px;
}

/* TOP */

.top-bar{
flex-direction:column;
align-items:flex-start;
}

.top-bar h1{
font-size:38px;
}

/* TASK */

.task-row{
grid-template-columns:1fr;
}

/* =========================================
BOTTOM NAV
========================================= */

.mobileBottomNav{

display:flex;
justify-content:space-around;
align-items:center;

position:fixed;

bottom:12px;
left:12px;
right:12px;

height:58px;

background:rgba(7,27,70,0.88);

backdrop-filter:blur(18px);

border-radius:24px;

border:1px solid rgba(255,255,255,0.06);

box-shadow:
0 8px 25px rgba(0,0,0,0.25);

z-index:5000;

padding:6px;

}

/* ITEM */

.bottomNavItem{

flex:1;

display:flex;
flex-direction:column;

align-items:center;
justify-content:center;

text-decoration:none;

gap:4px;

background:transparent;

transition:0.3s ease;

}

/* ICON */

.bottomIcon{

width:38px;
height:38px;

border-radius:14px;

background:#12307a;

display:flex;
align-items:center;
justify-content:center;

transition:0.3s;

}

/* IMAGE */

.bottomIcon img{

width:45px;
height:45px;

object-fit:contain;

}

/* TEXT */

.bottomNavItem p{

font-size:9px;
font-weight:600;

color:white;

}

/* ACTIVE */

.bottomNavItem.active .bottomIcon{

background:#f5a300;

width:34px;
height:34px;

border-radius:12px;

}

}

/* =========================================
DESKTOP HIDE
========================================= */

@media(min-width:901px){

.mobileBottomNav{
display:none;
}

}

<script>

/* =========================================
SCRIPT URL
========================================= */

const SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbyFx70qjoYYPeer9JMMvcXKiswUXe0HUJDaRSEGZeUVLjdOCKOQ2icoKCaPlWPEVImwXg/exec";

/* =========================================
IMGBB
========================================= */

const IMGBB_API_KEY =
"474625ac45e96672f499790199a07997";

/* =========================================
EMPLOYEE
========================================= */

const employee =
JSON.parse(localStorage.getItem("employee"));

if(!employee){

alert("Please Login First");

window.location.href =
"index.html";

}

const employeeName =
employee.name || employee.Name || "";

/* SHOW NAME */

document.getElementById(
"employeeBox"
).innerText = employeeName;

/* =========================================
SIDEBAR
========================================= */

function openSidebar(){

document
.getElementById("sidebar")
.classList.toggle("show");

}

/* =========================================
DROPDOWN
========================================= */

function toggleDropdown(id){

document
.getElementById(id)
.classList.toggle("show");

}

/* =========================================
LOAD TASKS
========================================= */

function loadTasks(){

const callbackName =
"taskCallback_" + Date.now();

window[callbackName] =
function(response){

const container =
document.getElementById(
"tasksContainer"
);

if(
!response.success ||
response.tasks.length == 0
){

container.innerHTML =
"<h2>No Tasks Found</h2>";

return;

}

/* GROUP */

let grouped = {};

response.tasks.forEach(task=>{

const project =
task.project || "General";

if(!grouped[project]){

grouped[project] = [];

}

grouped[project].push(task);

});

container.innerHTML = "";

/* LOOP */

for(let project in grouped){

container.innerHTML += `

<div class="project-section">

<div class="project-title">

${project}

</div>

<div id="project_${project}"></div>

</div>

`;

const section =
document.getElementById(
`project_${project}`
);

grouped[project].forEach(task=>{

let priorityClass = "low";

if(task.priority=="High"){
priorityClass="high";
}

if(task.priority=="Medium"){
priorityClass="medium";
}

let statusClass = "pending";

if(
task.status=="Started" ||
task.status=="In Progress"
){
statusClass="progress";
}

if(task.status=="Completed"){
statusClass="completed";
}

section.innerHTML += `

<div class="task-row
${task.status == "Completed" ? "completed-task done" : ""}
${task.status == "Pending" ? "pending-task" : ""}
${task.status == "Started" || task.status == "In Progress" ? "progress-task" : ""}">

<div>

<div class="task-title">

${task.taskTitle}

</div>

<div>

${task.description || ""}

</div>

</div>

<div>

<span class="${priorityClass}">
${task.priority}
</span>

</div>

<div>

${task.deadline
? task.deadline.split("T")[0]
: "-"}

</div>

<div>

<span class="status-badge ${statusClass}">

${task.status}

</span>

</div>

<div>

<input
type="text"
id="update_${task.taskID}"
placeholder="Work Update">

<br><br>

<input
type="file"
id="proof_${task.taskID}"
class="file-box">

${
task.completionProof
?

`<a
href="${task.completionProof}"
target="_blank"
class="proof-link">

View Proof

</a>`

:

""
}

</div>

<div>

<select id="status_${task.taskID}">

<option
${task.status=="Pending"?"selected":""}>
Pending
</option>

<option
${task.status=="Started"?"selected":""}>
Started
</option>

<option
${task.status=="In Progress"?"selected":""}>
In Progress
</option>

<option
${task.status=="Completed"?"selected":""}>
Completed
</option>

</select>

<button
class="update-btn"
onclick="updateTask('${task.taskID}')">

Update

</button>

</div>

</div>

`;

});

}

delete window[callbackName];

};

/* JSONP */

const script =
document.createElement("script");

script.src =

`${SCRIPT_URL}
?action=assignedTasks
&employee=${encodeURIComponent(employeeName)}
&callback=${callbackName}`;

document.body.appendChild(script);

}

/* =========================================
UPDATE TASK
========================================= */

async function updateTask(taskID){

const status =
document.getElementById(
`status_${taskID}`
).value;

const employeeUpdate =
document.getElementById(
`update_${taskID}`
).value;

const fileInput =
document.getElementById(
`proof_${taskID}`
);

let proofLink = "";

/* IMAGE */

if(fileInput.files.length > 0){

const file =
fileInput.files[0];

const formData =
new FormData();

formData.append(
"image",
file
);

try{

const uploadResponse =
await fetch(

`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`,

{
method:"POST",
body:formData
}

);

const uploadData =
await uploadResponse.json();

if(uploadData.success){

proofLink =
uploadData.data.url;

}
else{

alert("Image Upload Failed");
return;

}

}
catch(error){

alert("Image Upload Failed");
return;

}

}

/* DATA */

const data = {

type:"updateAssignedTask",

taskID:taskID,

employee:employeeName,

status:status,

employeeUpdate:employeeUpdate,

completionProof:proofLink

};

/* SAVE */

try{

await fetch(SCRIPT_URL,{

method:"POST",

mode:"no-cors",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify(data)

});

alert(
"Task Updated Successfully"
);

loadTasks();

}
catch(error){

alert(
"Update Failed"
);

}

}

/* =========================================
LOGOUT
========================================= */

function logout(){

localStorage.clear();

window.location.href =
"index.html";

}

/* =========================================
START
========================================= */

loadTasks();

</script>
