<!DOCTYPE html>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#041638;
display:flex;
color:white;
}

/* SIDEBAR */

.sidebar{
position:fixed;
width:250px;
height:100vh;
background:#071b46;
padding:25px 18px;
overflow-y:auto;
left:0;
top:0;
}

.logo{
text-align:center;

}

.logo img{

}

.logo h2{
margin-top:10px;
font-size:30px;
color:white;
}

.menu{
margin-top:20px;

/* MENU BUTTON */

.menu-btn{
display:block;
width:100%;
padding:15px;
margin-bottom:12px;
border-radius:12px;
background:#0f2c6b;
color:white;
text-decoration:none;
font-size:16px;
font-weight:bold;
transition:0.3s;
text-align:left;
border:none;
cursor:pointer;
}

.menu-btn:hover{
background:#f5a000;
transform:translateX(3px);
}

/* ACTIVE */

.active{
background:#f5a000 !important;
color:black !important;
}

/* DROPDOWN */

.dropdown-btn{
display:block;
width:100%;
padding:15px;
margin-bottom:12px;
border-radius:12px;
background:#17357a;
color:#ffb400;
font-size:16px;
font-weight:bold;
border:none;
cursor:pointer;
text-align:left;
}

.dropdown-content{
display:none;
padding-left:10px;
margin-bottom:10px;
}

.dropdown-content.show{
display:block;
}

.dropdown-content a{
display:block;
padding:14px;
margin-bottom:10px;
border-radius:12px;
background:#0f2c6b;
color:white;
text-decoration:none;
font-weight:bold;
transition:0.3s;
}

.dropdown-content a:hover{
background:#f5a000;
color:black;
}

/* LOGOUT */

.logout-btn{
display:block;
width:100%;
padding:15px;
margin-top:25px;
border-radius:12px;
background:red;
color:white;
text-decoration:none;
font-size:16px;
font-weight:bold;
text-align:center;
transition:0.3s;
}

.logout-btn:hover{
background:#cc0000;
}

/* MAIN */

.main{
margin-left:250px;
padding:40px;
width:100%;
}

/* CARD */

.card{
background:white;
color:black;
padding:30px;
border-radius:20px;
}

/* TITLE */

.title{
font-size:42px;
font-weight:bold;
margin-bottom:25px;
}

/* SEARCH */

.searchBox{
margin-bottom:25px;
}

.searchBox input{
width:100%;
padding:15px;
border:1px solid #ccc;
border-radius:12px;
font-size:16px;
outline:none;
}

/* TABLE */

.tableContainer{
overflow-x:auto;
}

table{
width:100%;
border-collapse:collapse;
}

table th{
background:#071b46;
color:white;
padding:14px;
text-align:left;
}

table td{
padding:14px;
border-bottom:1px solid #ddd;
}

/* STOCK COLORS */

.high{
color:green;
font-weight:bold;
}

.medium{
color:#f5a000;
font-weight:bold;
}

.low{
color:red;
font-weight:bold;
}

/* MOBILE */

@media(max-width:900px){

body{
display:block;
}

.sidebar{
position:relative;
width:100%;
height:auto;
}

.main{
margin-left:0;
padding:20px;
}

.title{
font-size:30px;
}

}

</style>

</head>

<body>

<div class="logo">

<h2>SHOWY</h2>

<div class="menu">

</a>

<div class="dropdown-content" id="hrMenu">

<a href="attendance.html">

</a>

<a href="leave-status.html">

</div>

<!-- SITE OPERATIONS -->

<button class="dropdown-btn" onclick="toggleDropdown('siteMenu')">
Site Operations ▼
</button>

<div class="dropdown-content" id="siteMenu">


<a href="vehicle-site-keys.html">
Vehicle / Site Keys
</a>

<a href="daily-task.html">

</a>

<!-- INVENTORY -->

<button class="dropdown-btn" onclick="toggleDropdown('inventoryMenu')">

</button>

<div class="dropdown-content show" id="inventoryMenu">

<a href="inventory.html" class="active">

<a href="company-hub.html" class="menu-btn">

</a>

<a href="index.html" class="logout-btn">

</a>

</div>

<!-- MAIN -->

<div class="main">

<div class="card">

<div class="title">
Inventory Management
</div>

<!-- SEARCH -->

<div class="searchBox">

<input
type="text"
id="search"
placeholder="Search Material / Company / Category"
onkeyup="filterInventory()"
>

</div>

<!-- TABLE -->

<div class="tableContainer">

<table>

<thead>

<tr>

<th>Material Code</th>
<th>Material Name</th>
<th>Company</th>
<th>Category</th>
<th>Unit</th>
<th>Available Stock</th>
<th>Warehouse</th>

</tr>

</thead>

<tbody id="inventoryTable">

</tbody>

</table>

</div>

</div>

</div>

<script>

/* DROPDOWN */

function toggleDropdown(id){

document
.getElementById(id)
.classList.toggle("show");

}

/* INVENTORY API */

const INVENTORY_URL =
"https://opensheet.elk.sh/1WgtFzzQTJ4-lRyrS0SURRH8fmMGqjK7Yt2ACDYmn0ZU/Inventory";

/* DATA */

let inventoryData = [];

/* LOAD INVENTORY */

async function loadInventory(){

try{

const response =
await fetch(INVENTORY_URL);

inventoryData =
await response.json();

showInventory(inventoryData);

}
catch(error){

console.log(error);

alert("Failed to load inventory");

}

}

/* SHOW INVENTORY */

function showInventory(data){

const table =
document.getElementById("inventoryTable");

table.innerHTML = "";

if(data.length === 0){

table.innerHTML = `

<tr>

<td colspan="7">
No Inventory Found
</td>

</tr>

`;

return;

}

data.forEach(item => {

let stockClass = "high";

const stock =
Number(item["Available Stock"]);

const minStock =
Number(item["Minimum Stock"]);

if(stock <= minStock){

stockClass = "low";

}
else if(stock <= minStock + 20){

stockClass = "medium";

}

table.innerHTML += `

<tr>

<td>${item["Material Code"]}</td>

<td>${item["Material Name"]}</td>

<td>${item["Company"]}</td>

<td>${item["Category"]}</td>

<td>${item["Unit"]}</td>

<td class="${stockClass}">
${item["Available Stock"]}
</td>

<td>${item["Warehouse"]}</td>

</tr>

`;

});

}

/* FILTER */

function filterInventory(){

const search =
document.getElementById("search")
.value
.toLowerCase();

const filtered =
inventoryData.filter(item =>

(item["Material Code"] || "")
.toLowerCase()
.includes(search)

||

(item["Material Name"] || "")
.toLowerCase()
.includes(search)

||

(item["Company"] || "")
.toLowerCase()
.includes(search)

||

(item["Category"] || "")
.toLowerCase()
.includes(search)

);

showInventory(filtered);

}

/* START */

loadInventory();

/* LOGOUT */

function logout(){

localStorage.removeItem("employee");

window.location.href =
"index.html";

}

</script>
