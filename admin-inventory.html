<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Admin Inventory
</title>

<link
rel="icon"
href="assets/logo.png">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#041638;
display:flex;
color:white;
}

/* SIDEBAR */

.sidebar{
width:260px;
height:100vh;
background:#071b46;
padding:25px 18px;
position:fixed;
left:0;
top:0;
overflow-y:auto;
}

.logo{
text-align:center;
margin-bottom:35px;
}

.logo img{
width:90px;
margin-bottom:10px;
}

.logo h2{
font-size:32px;
}

/* MENU */

.menu{
display:flex;
flex-direction:column;
gap:14px;
}

.menu button{
padding:15px;
border:none;
border-radius:14px;
background:#17357a;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
text-align:left;
}

.menu button:hover{
background:#f5a000;
color:black;
transform:translateX(3px);
}

.active{
background:#f5a000 !important;
color:black !important;
}

.logoutBtn{
background:red !important;
color:white !important;
margin-top:20px;
}

.logoutBtn:hover{
background:#cc0000 !important;
}

/* MAIN */

.main{
margin-left:260px;
padding:35px;
width:100%;
}

/* TOP */

.topBar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
flex-wrap:wrap;
gap:20px;
}

.topBar h1{
font-size:48px;
}

/* BUTTON */

.addBtn{
background:#f5a000;
color:black;
border:none;
padding:14px 20px;
border-radius:14px;
font-weight:bold;
font-size:16px;
cursor:pointer;
}

/* STATS */

.stats{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:30px;
}

.statCard{
background:white;
color:black;
padding:25px;
border-radius:22px;
}

.statCard h2{
font-size:18px;
color:#666;
margin-bottom:15px;
}

.statCard p{
font-size:42px;
font-weight:bold;
color:#071b46;
}

/* FILTER */

.filters{
display:flex;
gap:15px;
margin-bottom:25px;
flex-wrap:wrap;
}

.filters input,
.filters select{
padding:14px;
border:none;
border-radius:12px;
font-size:15px;
outline:none;
min-width:220px;
}

/* CARD */

.card{
background:white;
color:black;
padding:25px;
border-radius:24px;
overflow-x:auto;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

table th{
background:#071b46;
color:white;
padding:16px;
text-align:left;
font-size:15px;
}

table td{
padding:16px;
border-bottom:1px solid #ddd;
font-size:15px;
}

/* STOCK */

.inStock{
color:green;
font-weight:bold;
}

.lowStock{
color:#ff9900;
font-weight:bold;
}

.outStock{
color:red;
font-weight:bold;
}

/* BUTTONS */

.editBtn{
background:#071b46;
color:white;
border:none;
padding:10px 14px;
border-radius:10px;
cursor:pointer;
font-weight:bold;
margin-right:8px;
}

.deleteBtn{
background:red;
color:white;
border:none;
padding:10px 14px;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

/* MOBILE */

@media(max-width:900px){

body{
display:block;
}

.sidebar{
position:relative;
width:100%;
height:auto;
}

.main{
margin-left:0;
padding:20px;
}

.topBar h1{
font-size:34px;
}

.filters{
flex-direction:column;
}

.filters input,
.filters select{
width:100%;
}

}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">

<img src="assets/logo.png">

<h2>
SHOWY
</h2>

</div>

<div class="menu">

<button onclick="window.location.href='admin-dashboard.html'">
Dashboard
</button>

<button onclick="window.location.href='admin-employees.html'">
Employees
</button>

<button onclick="window.location.href='admin-attendance.html'">
Attendance
</button>

<button onclick="window.location.href='admin-task-assign.html'">
Tasks
</button>

<button onclick="window.location.href='admin-announcements.html'">
Announcements
</button>

<button onclick="window.location.href='admin-vehicle-site-keys.html'">
Vehicle & Keys
</button>

<button onclick="window.location.href='admin-materials.html'">
Material Requests
</button>

<button class="active">
Inventory
</button>

<button onclick="window.location.href='admin-reports.html'">
Reports
</button>

<button
class="logoutBtn"
onclick="logout()">

Logout

</button>

</div>

</div>

<!-- MAIN -->

<div class="main">

<div class="topBar">

<h1>
Inventory Management
</h1>

<button
class="addBtn"
onclick="addInventory()">

+ Add Item

</button>

</div>

<!-- STATS -->

<div class="stats">

<div class="statCard">

<h2>
Total Items
</h2>

<p id="totalItems">
0
</p>

</div>

<div class="statCard">

<h2>
Low Stock
</h2>

<p id="lowStock">
0
</p>

</div>

<div class="statCard">

<h2>
Out Of Stock
</h2>

<p id="outStock">
0
</p>

</div>

</div>

<!-- FILTERS -->

<div class="filters">

<input
type="text"
id="searchInput"
placeholder="Search Item"
onkeyup="filterInventory()">

<select
id="categoryFilter"
onchange="filterInventory()">

<option value="">
All Categories
</option>

<option value="Electrical">
Electrical
</option>

<option value="Plumbing">
Plumbing
</option>

<option value="Hardware">
Hardware
</option>

<option value="Painting">
Painting
</option>

<option value="Tools">
Tools
</option>

</select>

<select
id="stockFilter"
onchange="filterInventory()">

<option value="">
All Stock
</option>

<option value="In Stock">
In Stock
</option>

<option value="Low Stock">
Low Stock
</option>

<option value="Out Of Stock">
Out Of Stock
</option>

</select>

</div>

<!-- TABLE -->

<div class="card">

<table>

<thead>

<tr>

<th>Item ID</th>
<th>Item Name</th>
<th>Category</th>
<th>Quantity</th>
<th>Unit</th>
<th>Stock Status</th>
<th>Last Updated</th>
<th>Action</th>

</tr>

</thead>

<tbody id="inventoryTable">

<tr>

<td colspan="8">
Loading...
</td>

</tr>

</tbody>

</table>

</div>

</div>

<script>

/* ======================================
   AUTH CHECK
====================================== */

const employee =
JSON.parse(
localStorage.getItem("employee")
);

if(!employee){

window.location.href =
"index.html";

}

const role =
(employee.role || "")
.toLowerCase();

if(
role !== "admin" &&
role !== "super admin"
){

alert("Access Denied");

window.location.href =
"dashboard.html";

}

/* ======================================
   SHEET URL
====================================== */

const SHEET_URL =

"https://opensheet.elk.sh/1WgtFzzQTJ4-lRyrS0SURRH8fmMGqjK7Yt2ACDYmn0ZU/Inventory";

/* ======================================
   GLOBAL
====================================== */

let inventoryData = [];

/* ======================================
   LOAD INVENTORY
====================================== */

async function loadInventory(){

const response =
await fetch(SHEET_URL);

inventoryData =
await response.json();

renderInventory(inventoryData);

updateStats(inventoryData);

}

/* ======================================
   RENDER INVENTORY
====================================== */

function renderInventory(data){

const table =
document.getElementById(
"inventoryTable"
);

if(data.length === 0){

table.innerHTML = `

<tr>
<td colspan="8">
No Inventory Data
</td>
</tr>

`;

return;

}

table.innerHTML = "";

data.forEach(item=>{

let stockStatus = "";
let stockClass = "";

const qty =
Number(item.Quantity || 0);

if(qty === 0){

stockStatus = "Out Of Stock";
stockClass = "outStock";

}

else if(qty <= 5){

stockStatus = "Low Stock";
stockClass = "lowStock";

}

else{

stockStatus = "In Stock";
stockClass = "inStock";

}

table.innerHTML += `

<tr>

<td>
${item.ID || "-"}
</td>

<td>
${item.Item || "-"}
</td>

<td>
${item.Category || "-"}
</td>

<td>
${item.Quantity || "0"}
</td>

<td>
${item.Unit || "-"}
</td>

<td class="${stockClass}">
${stockStatus}
</td>

<td>
${item["Last Updated"] || "-"}
</td>

<td>

<button
class="editBtn"
onclick="editItem('${item.ID}')">

Edit

</button>

<button
class="deleteBtn"
onclick="deleteItem('${item.ID}')">

Delete

</button>

</td>

</tr>

`;

});

}

/* ======================================
   STATS
====================================== */

function updateStats(data){

const total =
data.length;

const low =
data.filter(
x =>
Number(x.Quantity) <= 5 &&
Number(x.Quantity) > 0
).length;

const out =
data.filter(
x =>
Number(x.Quantity) === 0
).length;

document.getElementById(
"totalItems"
).innerHTML = total;

document.getElementById(
"lowStock"
).innerHTML = low;

document.getElementById(
"outStock"
).innerHTML = out;

}

/* ======================================
   FILTER
====================================== */

function filterInventory(){

const search =
document
.getElementById("searchInput")
.value
.toLowerCase();

const category =
document
.getElementById("categoryFilter")
.value;

const stock =
document
.getElementById("stockFilter")
.value;

const filtered =
inventoryData.filter(item=>{

const nameMatch =

(item.Item || "")
.toLowerCase()
.includes(search);

const categoryMatch =

category === "" ||

item.Category === category;

let stockStatus = "";

const qty =
Number(item.Quantity || 0);

if(qty === 0){

stockStatus = "Out Of Stock";

}

else if(qty <= 5){

stockStatus = "Low Stock";

}

else{

stockStatus = "In Stock";

}

const stockMatch =

stock === "" ||

stock === stockStatus;

return(
nameMatch &&
categoryMatch &&
stockMatch
);

});

renderInventory(filtered);

updateStats(filtered);

}

/* ======================================
   ADD ITEM
====================================== */

function addInventory(){

alert(
"Next Step:\nConnect Add Inventory Form"
);

}

/* ======================================
   EDIT ITEM
====================================== */

function editItem(id){

alert(
"Edit Inventory Item : " + id
);

}

/* ======================================
   DELETE ITEM
====================================== */

function deleteItem(id){

const confirmDelete =
confirm(
"Delete Inventory Item?"
);

if(!confirmDelete) return;

alert(
"Connect Delete App Script for Item : " + id
);

}

/* ======================================
   LOGOUT
====================================== */

function logout(){

localStorage.clear();

window.location.href =
"index.html";

}

/* ======================================
   START
====================================== */

loadInventory();

</script>

</body>

</html>
