<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" href="assets/logo.png">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#041638;
color:white;
display:flex;
}

/* SIDEBAR */

.sidebar{
position:fixed;
width:250px;
height:100vh;
background:#071b46;
padding:25px 18px;
overflow-y:auto;
left:0;
top:0;
}

.logo{
text-align:center;
margin-bottom:35px;
}

.logo img{
width:90px;
}

.logo h2{
margin-top:10px;
font-size:30px;
color:white;
}

.menu{
margin-top:20px;
}

/* MENU BUTTON */

.menu-btn{
display:block;
width:100%;
padding:15px;
margin-bottom:12px;
border-radius:12px;
background:#0f2c6b;
color:white;
text-decoration:none;
font-size:16px;
font-weight:bold;
transition:0.3s;
text-align:left;
border:none;
cursor:pointer;
}

.menu-btn:hover{
background:#f5a000;
transform:translateX(3px);
}

/* ACTIVE */

.active{
background:#f5a000 !important;
color:black !important;
}

/* DROPDOWN */

.dropdown-btn{
display:block;
width:100%;
padding:15px;
margin-bottom:12px;
border-radius:12px;
background:#17357a;
color:#ffb400;
font-size:16px;
font-weight:bold;
border:none;
cursor:pointer;
text-align:left;
}

.dropdown-content{
display:none;
padding-left:10px;
margin-bottom:10px;
}

.dropdown-content.show{
display:block;
}

.dropdown-content a{
display:block;
padding:14px;
margin-bottom:10px;
border-radius:12px;
background:#0f2c6b;
color:white;
text-decoration:none;
font-weight:bold;
transition:0.3s;
}

.dropdown-content a:hover{
background:#f5a000;
color:black;
}

/* LOGOUT */

.logout-btn{
display:block;
width:100%;
padding:15px;
margin-top:25px;
border-radius:12px;
background:red;
color:white;
text-decoration:none;
font-size:16px;
font-weight:bold;
text-align:center;
transition:0.3s;
}

.logout-btn:hover{
background:#cc0000;
}

/* MAIN */

.main{
margin-left:250px;
padding:40px;
width:100%;
}

/* CARD */

.card{
background:white;
color:black;
padding:30px;
border-radius:20px;
overflow-x:auto;
}

.card h1{
margin-bottom:25px;
font-size:40px;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
min-width:700px;
}

th{
background:#f5a000;
color:black;
padding:15px;
text-align:left;
font-size:16px;
}

td{
padding:15px;
border-bottom:1px solid #ddd;
font-size:15px;
}

/* STATUS */

.pending{
color:orange;
font-weight:bold;
}

.approved{
color:green;
font-weight:bold;
}

.rejected{
color:red;
font-weight:bold;
}

/* MOBILE */

@media(max-width:900px){

body{
display:block;
}

.sidebar{
position:relative;
width:100%;
height:auto;
}

.main{
margin-left:0;
padding:20px;
}

.card h1{
font-size:28px;
}

}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">

<img src="assets/logo.png">

<h2>SHOWY</h2>

</div>

<div class="menu">

<a href="dashboard.html" class="menu-btn">
Dashboard

<a href="employee-movement.html" class="menu-btn">

<button class="dropdown-btn" onclick="toggleDropdown('hrMenu')">
HR ▼

<div class="dropdown-content show" id="hrMenu">

<a href="attendance.html">

</a>

<a href="leave.html">

<a href="leave-status.html" class="active">

</div>

<!-- SITE OPERATIONS -->

<button class="dropdown-btn" onclick="toggleDropdown('siteMenu')">
Site Operations ▼
</button>

<div class="dropdown-content" id="siteMenu">


<a href="vehicle-site-keys.html">
Vehicle / Site Keys
</a>

<a href="daily-task.html">

<a href="material-request.html">

</div>

<!-- INVENTORY -->

<button class="dropdown-btn" onclick="toggleDropdown('inventoryMenu')">

</button>

<div class="dropdown-content" id="inventoryMenu">

<a href="inventory.html">

Logout
</a>

</div>

</div>

<!-- MAIN -->

<div class="main">

<div class="card">

<h1>
My Leave Requests
</h1>

<table>

<thead>

<tr>

<th>
Leave Type
</th>

<th>
From
</th>

<th>
To
</th>

<th>
Reason
</th>

<th>
Status
</th>

</tr>

</thead>

<tbody id="leaveTable">

</tbody>

</table>

</div>

</div>

<script>

/* DROPDOWN */

function toggleDropdown(id){

document
.getElementById(id)
.classList.toggle("show");

}

/* EMPLOYEE */

const employee =
JSON.parse(localStorage.getItem("employee"));

if(!employee){

window.location.href =
"index.html";

}

/* LOAD LEAVES */

async function loadLeaves(){

try{

const response =
await fetch(
"https://opensheet.elk.sh/1WgtFzzQTJ4-lRyrS0SURRH8fmMGqjK7Yt2ACDYmn0ZU/Leave_Request"
);

const data =
await response.json();

const table =
document.getElementById("leaveTable");

table.innerHTML = "";

const employeeLeaves =
data.filter(
row =>
row.Name &&
row.Name.toLowerCase() ===
(employee.name || "").toLowerCase()
);

if(employeeLeaves.length === 0){

table.innerHTML = `
<tr>
<td colspan="5">
No leave requests found
</td>
</tr>
`;

return;

}

employeeLeaves.reverse();

employeeLeaves.forEach(row => {

let statusClass = "";

if(row.Status == "Pending"){

statusClass = "pending";

}

if(row.Status == "Approved"){

statusClass = "approved";

}

if(row.Status == "Rejected"){

statusClass = "rejected";

}

table.innerHTML += `

<tr>

<td>
${row.LeaveType}
</td>

<td>
${row.FromDate}
</td>

<td>
${row.ToDate}
</td>

<td>
${row.Reason}
</td>

<td class="${statusClass}">
${row.Status}
</td>

</tr>

`;

});

}
catch(error){

console.log(error);

alert("Error loading leave status");

}

}

/* START */

loadLeaves();

/* LOGOUT */

function logout(){

localStorage.removeItem("employee");

window.location.href =
"index.html";

}

</script>
