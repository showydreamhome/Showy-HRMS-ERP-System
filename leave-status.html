<script>

/* ======================================
SIDEBAR
====================================== */

function openSidebar(){

document
.getElementById("sidebar")
.classList.toggle("show");

}

/* ======================================
DROPDOWN
====================================== */

function toggleDropdown(id){

document
.getElementById(id)
.classList.toggle("show");

}

/* ======================================
EMPLOYEE
====================================== */

const employee =

JSON.parse(
localStorage.getItem("employee")
);

if(!employee){

window.location.href =
"index.html";

}

/* ======================================
LOAD LEAVES
====================================== */

async function loadLeaves(){

try{

const response =

await fetch(
"https://opensheet.elk.sh/1WgtFzzQTJ4-lRyrS0SURRH8fmMGqjK7Yt2ACDYmn0ZU/Leave_Request"
);

const data =
await response.json();

const table =
document.getElementById(
"leaveTable"
);

table.innerHTML = "";

const employeeLeaves =

data.filter(
row =>
row.Name &&
row.Name.toLowerCase() ===
(employee.name || "").toLowerCase()
);

if(employeeLeaves.length === 0){

table.innerHTML = `

<tr>

<td colspan="5"
class="emptyRow">

No Leave Requests Found

</td>

</tr>

`;

return;

}

employeeLeaves.reverse();

employeeLeaves.forEach(row => {

let statusClass = "";

if(row.Status == "Pending"){

statusClass = "pending";

}

if(row.Status == "Approved"){

statusClass = "approved";

}

if(row.Status == "Rejected"){

statusClass = "rejected";

}

table.innerHTML += `

<tr>

<td>
${row.LeaveType}
</td>

<td>
${row.FromDate}
</td>

<td>
${row.ToDate}
</td>

<td>
${row.Reason}
</td>

<td class="${statusClass}">
${row.Status}
</td>

</tr>

`;

});

}
catch(error){

console.log(error);

alert("Error Loading Leave Status");

}

}

/* ======================================
START
====================================== */

loadLeaves();

</script>
